<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Peserta - Medika Edukasi Nusantara</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'alo-blue': '#1E73BE',
              'member-bg': '#f8fafc',
            }
          }
        }
      }
    </script>

    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-member-bg font-sans text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- INISIALISASI SUPABASE ---
        const supabaseUrl = 'https://ciigcaudmesmtgznyoga.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpaWdjYXVkbWVzbXRnem55b2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODE3ODMsImV4cCI6MjA5ODU1Nzc4M30.YvJsAghqgb1RnXrJGVZQgl1veHj-75_ewpkmNBXpZfQ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // --- KOMPONEN UTAMA ---
        function App() {
            // State autentikasi
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isRegistering, setIsRegistering] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            
            // State data user & dashboard
            const [userProfile, setUserProfile] = useState(null);
            const [registrations, setRegistrations] = useState([]);
            const [schedules, setSchedules] = useState([]);
            const [activeMenu, setActiveMenu] = useState('Overview');

            // --- CEK SESSION SAAT PERTAMA KALI LOAD ---
            useEffect(() => {
                const getSession = async () => {
                    const { data: { session }, error } = await supabase.auth.getSession();
                    if (error) {
                        console.error('Error getting session:', error);
                    }
                    setSession(session);
                    setLoading(false);
                };
                getSession();

                // Listen for auth changes (logout, login)
                const { data: listener } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (!session) {
                        setUserProfile(null);
                        setRegistrations([]);
                    }
                });

                return () => listener?.subscription?.unsubscribe();
            }, []);

            // --- FETCH DATA USER & REGISTRATIONS KETIKA SESSION BERUBAH ---
            useEffect(() => {
                if (session?.user) {
                    fetchUserData(session.user);
                } else {
                    setUserProfile(null);
                    setRegistrations([]);
                }
            }, [session]);

            async function fetchUserData(user) {
                try {
                    // Ambil profil dari tabel 'users' berdasarkan email (atau auth_id)
                    const { data: userData, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', user.email)
                        .single();

                    if (userError) {
                        console.error('Error fetching user profile:', userError);
                        // Jika user belum ada di tabel, buat otomatis (opsional)
                        // Di sini kita akan buat jika belum ada
                        if (userError.code === 'PGRST116') { // not found
                            const newUser = {
                                name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Pengguna',
                                email: user.email,
                                auth_id: user.id,
                                phone: user.user_metadata?.phone || '',
                                instansi: user.user_metadata?.instansi || '',
                                role: 'member',
                                member_since: new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })
                            };
                            const { data: inserted, error: insertError } = await supabase
                                .from('users')
                                .insert([newUser])
                                .select()
                                .single();
                            if (insertError) {
                                console.error('Error creating user profile:', insertError);
                                showToast('Gagal membuat profil user.');
                                return;
                            }
                            setUserProfile(inserted);
                            // Lanjut fetch registrations setelah user ada
                            fetchRegistrations(inserted.id);
                        } else {
                            showToast('Gagal memuat profil.');
                        }
                        return;
                    }

                    setUserProfile(userData);
                    // Ambil registrasi berdasarkan user_id
                    fetchRegistrations(userData.id);
                } catch (err) {
                    console.error('Error in fetchUserData:', err);
                }
            }

            async function fetchRegistrations(userId) {
                try {
                    // Ambil registrasi + jadwal terkait
                    const { data, error } = await supabase
                        .from('registrations')
                        .select(`
                            *,
                            schedules (*)
                        `)
                        .eq('user_id', userId)
                        .order('id', { ascending: false });

                    if (error) {
                        console.error('Error fetching registrations:', error);
                        return;
                    }
                    setRegistrations(data || []);
                    // Simpan schedules untuk referensi
                    const allSchedules = data?.map(r => r.schedules).filter(Boolean) || [];
                    setSchedules(allSchedules);
                } catch (err) {
                    console.error('Error in fetchRegistrations:', err);
                }
            }

            // --- FUNGSI AUTH ---
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const form = e.target;
                const email = form.email.value;
                const password = form.password.value;

                if (!email || !password) {
                    showToast('Harap isi email dan password.');
                    return;
                }

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password
                    });
                    if (error) {
                        showToast('Login gagal: ' + error.message);
                        return;
                    }
                    showToast('Login berhasil! Selamat datang.');
                } catch (err) {
                    showToast('Terjadi kesalahan: ' + err.message);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const form = e.target;
                const name = form.name.value;
                const email = form.email.value;
                const password = form.password.value;
                const phone = form.phone.value;
                const instansi = form.instansi.value;

                if (!name || !email || !password || !phone || !instansi) {
                    showToast('Semua field harus diisi.');
                    return;
                }

                try {
                    // Registrasi ke Supabase Auth
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            data: {
                                full_name: name,
                                phone: phone,
                                instansi: instansi
                            }
                        }
                    });
                    if (error) {
                        showToast('Registrasi gagal: ' + error.message);
                        return;
                    }
                    // Registrasi berhasil, tapi user mungkin perlu verifikasi email
                    showToast('Akun berhasil dibuat! Silakan cek email untuk verifikasi (jika diperlukan), lalu login.');
                    setIsRegistering(false); // balik ke form login
                } catch (err) {
                    showToast('Terjadi kesalahan: ' + err.message);
                }
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                setActiveMenu('Overview');
                showToast('Anda telah keluar.');
            };

            // --- RENDER LOGIN / REGISTER ---
            if (!session) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 px-4 relative overflow-hidden py-10">
                        {toastMessage && (
                            <div className="absolute top-6 right-1/2 transform translate-x-1/2 z-[100] animate-fade-in">
                                <div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 text-sm font-medium">
                                    <span className="material-symbols-outlined text-[18px]">info</span> {toastMessage}
                                </div>
                            </div>
                        )}

                        <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 z-10 animate-fade-in flex flex-col overflow-hidden max-h-[90vh]">
                            {isRegistering ? (
                                /* --- FORM REGISTER --- */
                                <div className="flex flex-col h-full overflow-hidden">
                                    <div className="bg-alo-blue p-6 text-center shrink-0">
                                        <h1 className="text-2xl font-bold text-white tracking-tight">Buat Akun Baru</h1>
                                        <p className="text-blue-100 text-sm mt-1">Daftar untuk mengelola riwayat pelatihan Anda</p>
                                    </div>
                                    <div className="p-6 md:p-8 flex-1 overflow-y-auto">
                                        <form onSubmit={handleRegister} className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap (beserta gelar)</label>
                                                <input required type="text" name="name" placeholder="Misal: Dr. Budi Santoso" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm bg-slate-50 focus:bg-white" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Email Pribadi</label>
                                                <input required type="email" name="email" placeholder="budi@email.com" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm bg-slate-50 focus:bg-white" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nomor WhatsApp Aktif</label>
                                                <input required type="tel" name="phone" placeholder="Misal: 081234567890" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm bg-slate-50 focus:bg-white" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Instansi / Rumah Sakit Asal</label>
                                                <input required type="text" name="instansi" placeholder="Misal: RSUP Dr. Cipto Mangunkusumo" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm bg-slate-50 focus:bg-white" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Kata Sandi (minimal 6 karakter)</label>
                                                <input required type="password" name="password" placeholder="••••••••" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm bg-slate-50 focus:bg-white" />
                                            </div>
                                            <button type="submit" className="w-full bg-alo-blue text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors shadow-md mt-6">
                                                Daftar Sekarang
                                            </button>
                                        </form>
                                        <div className="mt-8 text-center text-sm text-slate-500 pb-2">
                                            Sudah punya akun? <a href="#" onClick={(e) => { e.preventDefault(); setIsRegistering(false); }} className="text-alo-blue font-bold hover:underline">Masuk di sini</a>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* --- FORM LOGIN --- */
                                <div className="flex flex-col h-full overflow-hidden">
                                    <div className="bg-alo-blue p-8 text-center shrink-0">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-alo-blue shadow-lg mx-auto mb-4">
                                            <span className="material-symbols-outlined text-[32px] icon-filled">ecg_heart</span>
                                        </div>
                                        <h1 className="text-2xl font-bold text-white tracking-tight">Portal Peserta</h1>
                                        <p className="text-blue-100 text-sm mt-1">Masuk untuk mengelola pelatihan Anda</p>
                                    </div>
                                    <div className="p-8 flex-1 overflow-y-auto">
                                        <form onSubmit={handleLogin} className="space-y-5">
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                                                <div className="relative">
                                                    <span className="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 text-[20px]">person</span>
                                                    <input required type="email" name="email" placeholder="budi@email.com" className="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Kata Sandi</label>
                                                <div className="relative">
                                                    <span className="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 text-[20px]">lock</span>
                                                    <input required type="password" name="password" placeholder="••••••••" className="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none transition-shadow text-sm" />
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full bg-alo-blue text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors shadow-md mt-4">
                                                Masuk ke Dashboard
                                            </button>
                                        </form>
                                        <div className="mt-8 text-center text-sm text-slate-500">
                                            Belum punya akun? <a href="#" onClick={(e) => { e.preventDefault(); setIsRegistering(true); }} className="text-alo-blue font-bold hover:underline">Daftar sekarang</a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Background Decor */}
                        <div className="fixed top-[-20%] left-[-10%] w-96 h-96 bg-blue-100 rounded-full blur-3xl opacity-50 z-0 pointer-events-none"></div>
                        <div className="fixed bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-teal-50 rounded-full blur-3xl opacity-50 z-0 pointer-events-none"></div>
                    </div>
                );
            }

            // --- DASHBOARD MEMBER (sudah login) ---
            const menus = [
                { id: 'Overview', icon: 'dashboard', label: 'Ringkasan' },
                { id: 'Riwayat', icon: 'history', label: 'Riwayat Pelatihan' },
                { id: 'Sertifikat', icon: 'workspace_premium', label: 'E-Sertifikat' },
                { id: 'Profil', icon: 'person', label: 'Profil Saya' }
            ];

            // --- Render Overview ---
            const renderOverview = () => {
                const totalRegistrations = registrations.length;
                const completed = registrations.filter(r => r.status_pembayaran === 'Selesai').length;
                const certificates = registrations.filter(r => r.sertifikat_url).length;
                const pending = registrations.filter(r => r.status_pembayaran === 'Menunggu Pembayaran' || r.status_pembayaran === 'Menunggu Cek').length;

                // Ambil jadwal terdekat (misal yang statusnya Lunas atau Selesai)
                const upcoming = registrations.find(r => r.status_pembayaran === 'Lunas' || r.status_pembayaran === 'Selesai');
                const schedule = upcoming?.schedules;

                return (
                    <div className="space-y-8 animate-fade-in">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col md:flex-row items-center gap-6">
                            <div className="w-20 h-20 bg-blue-100 text-alo-blue rounded-full flex items-center justify-center flex-shrink-0 z-10 border-4 border-white shadow-md">
                                <span className="material-symbols-outlined text-[40px] icon-filled">waving_hand</span>
                            </div>
                            <div className="z-10 text-center md:text-left">
                                <h2 className="text-2xl md:text-3xl font-bold text-slate-800">Selamat datang kembali, {userProfile?.name || 'Peserta'}!</h2>
                                <p className="text-slate-500 mt-1">Siap untuk meningkatkan kompetensi medis Anda hari ini?</p>
                            </div>
                            <div className="absolute right-0 top-0 w-64 h-64 bg-gradient-to-br from-blue-50 to-transparent rounded-bl-[100px] z-0 opacity-50"></div>
                        </div>

                        {/* Quick Stats */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 group hover:border-alo-blue transition-colors">
                                <div className="w-14 h-14 bg-blue-50 text-alo-blue rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <span className="material-symbols-outlined text-[28px]">local_library</span>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">Total Pelatihan</p>
                                    <h3 className="text-2xl font-black text-slate-800">{totalRegistrations}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 group hover:border-green-500 transition-colors">
                                <div className="w-14 h-14 bg-green-50 text-green-500 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <span className="material-symbols-outlined text-[28px]">check_circle</span>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">Selesai</p>
                                    <h3 className="text-2xl font-black text-slate-800">{completed}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 group hover:border-orange-500 transition-colors">
                                <div className="w-14 h-14 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <span className="material-symbols-outlined text-[28px]">workspace_premium</span>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">Sertifikat</p>
                                    <h3 className="text-2xl font-black text-slate-800">{certificates}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 group hover:border-red-500 transition-colors">
                                <div className="w-14 h-14 bg-red-50 text-red-500 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <span className="material-symbols-outlined text-[28px]">pending_actions</span>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">Menunggu</p>
                                    <h3 className="text-2xl font-black text-slate-800">{pending}</h3>
                                </div>
                            </div>
                        </div>

                        {/* Upcoming Schedule */}
                        {schedule && (
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <span className="material-symbols-outlined text-alo-blue">event_upcoming</span> Agenda Terdekat Anda
                                    </h3>
                                    <button onClick={() => setActiveMenu('Riwayat')} className="text-sm font-semibold text-alo-blue hover:underline">Lihat Semua</button>
                                </div>
                                <div className="p-6 flex flex-col md:flex-row gap-6 items-center">
                                    <div className="w-20 h-20 bg-blue-100 text-alo-blue rounded-2xl flex flex-col items-center justify-center border border-blue-200 shrink-0 shadow-sm">
                                        <span className="text-sm font-bold uppercase">{schedule.date?.split(' ')[0] || 'TBA'}</span>
                                        <span className="text-2xl font-black leading-none">{schedule.date?.split(' ')[1] || ''}</span>
                                    </div>
                                    <div className="flex-1 text-center md:text-left">
                                        <div className="inline-block px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-wider rounded mb-2">Terkonfirmasi</div>
                                        <h4 className="text-xl font-bold text-slate-800 mb-1">{schedule.course}</h4>
                                        <div className="flex flex-wrap gap-4 text-sm text-slate-500 justify-center md:justify-start">
                                            <span className="flex items-center gap-1"><span className="material-symbols-outlined text-[16px]">schedule</span> {schedule.time}</span>
                                            <span className="flex items-center gap-1"><span className="material-symbols-outlined text-[16px]">calendar_month</span> {schedule.date}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- Render Riwayat ---
            const renderRiwayat = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">Riwayat Pelatihan</h2>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider">
                                        <th className="p-5 font-semibold">Nama Program</th>
                                        <th className="p-5 font-semibold">Tanggal Pelaksanaan</th>
                                        <th className="p-5 font-semibold">Biaya</th>
                                        <th className="p-5 font-semibold text-center">Status</th>
                                        <th className="p-5 font-semibold text-center">Sertifikat</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {registrations.length === 0 && (
                                        <tr><td colSpan="5" className="p-8 text-center text-slate-400">Belum ada riwayat pelatihan.</td></tr>
                                    )}
                                    {registrations.map(reg => {
                                        const schedule = reg.schedules;
                                        return (
                                            <tr key={reg.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-5">
                                                    <p className="font-bold text-slate-800 text-base">{schedule?.course || 'Program tidak ditemukan'}</p>
                                                    <p className="text-xs text-alo-blue font-semibold mt-0.5">{schedule?.category || '-'}</p>
                                                </td>
                                                <td className="p-5 text-slate-600 font-medium">{schedule?.date || '-'}</td>
                                                <td className="p-5 font-bold text-slate-700">{schedule?.price || '-'}</td>
                                                <td className="p-5 text-center">
                                                    {reg.status_pembayaran === 'Selesai' && <span className="px-3 py-1 text-xs font-bold rounded-full bg-slate-200 text-slate-700 border border-slate-300">Selesai</span>}
                                                    {reg.status_pembayaran === 'Lunas' && <span className="px-3 py-1 text-xs font-bold rounded-full bg-green-100 text-green-700 border border-green-200">Lunas / Aktif</span>}
                                                    {reg.status_pembayaran === 'Menunggu Pembayaran' && <span className="px-3 py-1 text-xs font-bold rounded-full bg-orange-100 text-orange-700 border border-orange-200">Menunggu Pembayaran</span>}
                                                    {reg.status_pembayaran === 'Menunggu Cek' && <span className="px-3 py-1 text-xs font-bold rounded-full bg-yellow-100 text-yellow-700 border border-yellow-200">Menunggu Verifikasi</span>}
                                                </td>
                                                <td className="p-5 text-center">
                                                    {reg.sertifikat_url ? (
                                                        <a href={reg.sertifikat_url} target="_blank" className="text-alo-blue hover:text-blue-800 font-semibold text-sm flex items-center justify-center gap-1">
                                                            <span className="material-symbols-outlined text-[18px]">download</span> Unduh
                                                        </a>
                                                    ) : (
                                                        <span className="text-slate-400 text-xs">-</span>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            // --- Render Sertifikat ---
            const renderSertifikat = () => {
                const certificates = registrations.filter(r => r.sertifikat_url);
                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">E-Sertifikat Saya</h2>
                                <p className="text-slate-500 text-sm">Unduh sertifikat pelatihan yang telah Anda selesaikan.</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {certificates.map(reg => {
                                const schedule = reg.schedules;
                                return (
                                    <div key={reg.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col group hover:shadow-lg transition-all">
                                        <div className="h-48 overflow-hidden relative border-b border-slate-100 bg-slate-100 flex items-center justify-center">
                                            <span className="material-symbols-outlined text-6xl text-slate-300">picture_as_pdf</span>
                                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent flex items-end p-4">
                                                <span className="text-white font-mono text-xs tracking-wider opacity-80">{schedule?.course || 'Sertifikat'}</span>
                                            </div>
                                            <div className="absolute top-3 right-3 bg-white/90 backdrop-blur rounded-full p-1.5 shadow-sm text-green-600">
                                                <span className="material-symbols-outlined text-[20px] icon-filled">verified</span>
                                            </div>
                                        </div>
                                        <div className="p-5 flex flex-col flex-1">
                                            <h3 className="font-bold text-slate-800 text-base mb-1 leading-snug">{schedule?.course || 'Pelatihan'}</h3>
                                            <p className="text-xs text-slate-500 mb-5 flex items-center gap-1"><span className="material-symbols-outlined text-[14px]">event_available</span> Lulus pada: {schedule?.date || '-'}</p>
                                            <a href={reg.sertifikat_url} target="_blank" className="mt-auto w-full bg-slate-50 hover:bg-alo-blue text-alo-blue hover:text-white border border-slate-200 hover:border-alo-blue py-2.5 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2">
                                                <span className="material-symbols-outlined text-[18px]">download</span> Unduh PDF
                                            </a>
                                        </div>
                                    </div>
                                );
                            })}
                            {certificates.length === 0 && (
                                <div className="bg-slate-50 rounded-3xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center p-8 text-center min-h-[300px] col-span-full">
                                    <div className="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center text-slate-400 mb-4">
                                        <span className="material-symbols-outlined text-[32px]">school</span>
                                    </div>
                                    <p className="text-sm font-semibold text-slate-600">Belum ada sertifikat</p>
                                    <p className="text-xs text-slate-400 mt-1">Sertifikat akan muncul setelah pelatihan selesai dan diunggah oleh admin.</p>
                                    <a href="index.html" target="_blank" className="mt-4 text-alo-blue font-bold text-sm hover:underline">Lihat Jadwal Terbuka</a>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // --- Render Profil ---
            const renderProfil = () => {
                const [formData, setFormData] = useState({
                    name: userProfile?.name || '',
                    instansi: userProfile?.instansi || '',
                    phone: userProfile?.phone || '',
                    email: userProfile?.email || '',
                });

                const handleSave = async (e) => {
                    e.preventDefault();
                    if (!userProfile) return;
                    const { error } = await supabase
                        .from('users')
                        .update({
                            name: formData.name,
                            instansi: formData.instansi,
                            phone: formData.phone,
                        })
                        .eq('id', userProfile.id);
                    if (error) {
                        showToast('Gagal update profil: ' + error.message);
                        return;
                    }
                    // Refresh user profile
                    const { data: updated } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', userProfile.id)
                        .single();
                    if (updated) setUserProfile(updated);
                    showToast('Profil berhasil diperbarui!');
                };

                return (
                    <div className="space-y-6 animate-fade-in max-w-3xl">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6">Pengaturan Profil</h2>
                        
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-8 border-b border-slate-100 flex flex-col md:flex-row items-center md:items-start gap-6 bg-slate-50/50">
                                <div className="relative group cursor-pointer">
                                    <div className="w-24 h-24 bg-alo-blue text-white rounded-full flex items-center justify-center text-3xl font-bold shadow-md border-4 border-white">
                                        {userProfile?.name?.charAt(0) || 'P'}
                                    </div>
                                </div>
                                <div className="text-center md:text-left flex-1">
                                    <h3 className="text-2xl font-bold text-slate-800">{userProfile?.name || 'Peserta'}</h3>
                                    <p className="text-alo-blue font-semibold text-sm mb-2">{userProfile?.instansi || '-'}</p>
                                    <p className="text-xs text-slate-500 bg-slate-200 inline-block px-3 py-1 rounded-full">Anggota sejak {userProfile?.member_since || '-'}</p>
                                </div>
                            </div>

                            <form className="p-8 space-y-6" onSubmit={handleSave}>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap</label>
                                        <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Instansi</label>
                                        <input type="text" value={formData.instansi} onChange={(e) => setFormData({...formData, instansi: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nomor WhatsApp</label>
                                        <input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                                        <input type="email" value={formData.email} disabled className="w-full px-4 py-2.5 border border-slate-300 rounded-xl bg-slate-50 text-slate-500 cursor-not-allowed" />
                                    </div>
                                </div>
                                
                                <hr className="border-slate-100" />
                                
                                <div>
                                    <h4 className="font-bold text-slate-800 text-sm mb-4">Ganti Kata Sandi (Opsional)</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <input type="password" placeholder="Kata Sandi Baru" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none" />
                                        </div>
                                        <div>
                                            <input type="password" placeholder="Konfirmasi Kata Sandi Baru" className="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-alo-blue focus:outline-none" />
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-end pt-4">
                                    <button type="submit" className="bg-alo-blue text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-md flex items-center gap-2">
                                        <span className="material-symbols-outlined text-[18px]">save</span> Simpan Perubahan
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            // --- RENDER DASHBOARD LAYOUT ---
            return (
                <div className="flex h-screen w-full bg-member-bg overflow-hidden relative">
                    {/* Toast */}
                    {toastMessage && (
                        <div className="absolute top-6 right-8 z-[100] animate-fade-in">
                            <div className="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-slate-700">
                                <span className="material-symbols-outlined text-green-400">check_circle</span>
                                <span className="text-sm font-medium">{toastMessage}</span>
                            </div>
                        </div>
                    )}

                    {/* Sidebar Desktop */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex flex-shrink-0 z-20">
                        <div className="h-20 flex items-center px-6 border-b border-slate-100 shrink-0">
                            <div className="w-8 h-8 bg-alo-blue rounded-lg flex items-center justify-center text-white mr-3 shadow-md">
                                <span className="material-symbols-outlined text-[20px]">ecg_heart</span>
                            </div>
                            <span className="font-bold text-slate-800 text-lg tracking-tight">Medika<span className="text-alo-blue">Edu</span></span>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                            <p className="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Menu Member</p>
                            {menus.map(menu => (
                                <button 
                                    key={menu.id} 
                                    onClick={() => setActiveMenu(menu.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-semibold ${
                                        activeMenu === menu.id 
                                        ? 'bg-blue-50 text-alo-blue' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'
                                    }`}
                                >
                                    <span className="material-symbols-outlined text-[20px]">{menu.icon}</span>
                                    {menu.label}
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl transition-colors text-sm font-bold text-slate-600 border border-slate-200 hover:bg-slate-50 hover:text-red-500">
                                <span className="material-symbols-outlined text-[18px]">logout</span> Keluar
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        {/* Mobile Header */}
                        <header className="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-20">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-alo-blue rounded-lg flex items-center justify-center text-white shadow-sm">
                                    <span className="material-symbols-outlined text-[18px]">ecg_heart</span>
                                </div>
                                <span className="font-bold text-slate-800">Portal Peserta</span>
                            </div>
                            <button className="text-slate-600 p-2" onClick={() => {}}>
                                <span className="material-symbols-outlined">menu</span>
                            </button>
                        </header>

                        {/* Top Navbar Desktop */}
                        <header className="h-20 bg-white/50 backdrop-blur-md border-b border-slate-200 hidden md:flex items-center justify-end px-8 z-10 sticky top-0 shrink-0">
                            <div className="flex items-center gap-4">
                                <a href="index.html" target="_blank" className="text-sm font-bold text-slate-500 hover:text-alo-blue flex items-center gap-1 transition-colors">
                                    <span className="material-symbols-outlined text-[18px]">language</span> Kembali ke Website Utama
                                </a>
                                <div className="h-6 w-px bg-slate-300 mx-2"></div>
                                <button className="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 hover:text-alo-blue transition-colors">
                                    <span className="material-symbols-outlined text-[20px]">notifications</span>
                                </button>
                            </div>
                        </header>

                        {/* Dynamic Content */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                            {activeMenu === 'Overview' && renderOverview()}
                            {activeMenu === 'Riwayat' && renderRiwayat()}
                            {activeMenu === 'Sertifikat' && renderSertifikat()}
                            {activeMenu === 'Profil' && renderProfil()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
