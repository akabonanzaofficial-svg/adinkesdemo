<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - Medika Edukasi Nusantara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'alo-blue': '#1E73BE',
              'admin-dark': '#0f172a',
              'admin-sidebar': '#1e293b',
            }
          }
        }
      }
    </script>

    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- INISIALISASI SUPABASE ---
        const supabaseUrl = 'https://ciigcaudmesmtgznyoga.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpaWdjYXVkbWVzbXRnem55b2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODE3ODMsImV4cCI6MjA5ODU1Nzc4M30.YvJsAghqgb1RnXrJGVZQgl1veHj-75_ewpkmNBXpZfQ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        function AdminDashboard() {
            const [activeMenu, setActiveMenu] = useState('Dashboard');
            const [jadwalTab, setJadwalTab] = useState('Pelatihan');
            const [activeModal, setActiveModal] = useState(null);
            const [toastMessage, setToastMessage] = useState('');

            // --- State untuk Program ---
            const [programs, setPrograms] = useState([]);
            const [loadingPrograms, setLoadingPrograms] = useState(false);
            const [formProgram, setFormProgram] = useState({ id: null, title: '', description: '', icon: '' });

            // --- Fetch Programs ---
            const fetchPrograms = async () => {
                setLoadingPrograms(true);
                const { data, error } = await supabase
                    .from('programs')
                    .select('*')
                    .order('id', { ascending: true });
                if (error) {
                    console.error('Error fetching programs:', error);
                    showToast('Gagal memuat data program');
                } else {
                    setPrograms(data);
                }
                setLoadingPrograms(false);
            };

            useEffect(() => {
                fetchPrograms();
            }, []);

            // --- CRUD Program ---
            const handleSaveProgram = async (e) => {
                e.preventDefault();
                if (formProgram.id) {
                    // Update
                    const { error } = await supabase
                        .from('programs')
                        .update({ title: formProgram.title, description: formProgram.description, icon: formProgram.icon })
                        .eq('id', formProgram.id);
                    if (error) {
                        showToast('Gagal mengupdate program');
                    } else {
                        showToast('Program berhasil diupdate');
                        fetchPrograms();
                        setActiveModal(null);
                        resetFormProgram();
                    }
                } else {
                    // Insert
                    const { error } = await supabase
                        .from('programs')
                        .insert([{ title: formProgram.title, description: formProgram.description, icon: formProgram.icon }]);
                    if (error) {
                        showToast('Gagal menambah program');
                    } else {
                        showToast('Program berhasil ditambahkan');
                        fetchPrograms();
                        setActiveModal(null);
                        resetFormProgram();
                    }
                }
            };

            const handleEditProgram = (program) => {
                setFormProgram({ id: program.id, title: program.title, description: program.description, icon: program.icon });
                setActiveModal('edit_program');
            };

            const handleDeleteProgram = async (id) => {
                if (window.confirm('Yakin ingin menghapus program ini?')) {
                    const { error } = await supabase
                        .from('programs')
                        .delete()
                        .eq('id', id);
                    if (error) {
                        showToast('Gagal menghapus program');
                    } else {
                        showToast('Program berhasil dihapus');
                        fetchPrograms();
                    }
                }
            };

            const resetFormProgram = () => {
                setFormProgram({ id: null, title: '', description: '', icon: '' });
            };

            // --- Toast ---
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // Menu navigasi sidebar (sama)
            const menus = [
                { id: 'Dashboard', icon: 'dashboard', label: 'Ringkasan' },
                { id: 'Profil', icon: 'corporate_fare', label: 'Profil Lembaga' },
                { id: 'Program', icon: 'auto_stories', label: 'Program Utama' },
                { id: 'Jadwal', icon: 'calendar_month', label: 'Jadwal & Acara' },
                { id: 'Peserta', icon: 'groups', label: 'Data Peserta' },
                { id: 'Pengajar', icon: 'badge', label: 'Data Pengajar' },
                { id: 'Berita', icon: 'newspaper', label: 'Berita & Artikel' },
                { id: 'Galeri', icon: 'photo_library', label: 'Galeri Kegiatan' },
            ];

            // --- Render Dashboard (masih mock) ---
            const renderDashboard = () => (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-bold text-slate-800">Ringkasan Sistem</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 border-l-4 border-l-green-500 hover:shadow-md transition-shadow cursor-pointer">
                            <div className="w-12 h-12 bg-green-50 text-green-500 rounded-full flex items-center justify-center"><span className="material-symbols-outlined">payments</span></div>
                            <div><p className="text-sm text-slate-500 font-medium">Pendapatan Bulan Ini</p><h3 className="text-xl font-bold text-slate-800">Rp 45.5M</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 border-l-4 border-l-orange-500 hover:shadow-md transition-shadow cursor-pointer">
                            <div className="w-12 h-12 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center"><span className="material-symbols-outlined">pending_actions</span></div>
                            <div><p className="text-sm text-slate-500 font-medium">Menunggu Approval</p><h3 className="text-2xl font-bold text-slate-800">12</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 border-l-4 border-l-red-500 hover:shadow-md transition-shadow cursor-pointer">
                            <div className="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center"><span className="material-symbols-outlined">workspace_premium</span></div>
                            <div><p className="text-sm text-slate-500 font-medium">Sertifikat Pending</p><h3 className="text-2xl font-bold text-slate-800">8</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 border-l-4 border-l-blue-500 hover:shadow-md transition-shadow cursor-pointer">
                            <div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center"><span className="material-symbols-outlined">event</span></div>
                            <div><p className="text-sm text-slate-500 font-medium">Total Jadwal Aktif</p><h3 className="text-2xl font-bold text-slate-800">5</h3></div>
                        </div>
                    </div>
                </div>
            );

            // --- Render Program (Terintegrasi Supabase) ---
            const renderProgram = () => (
                <div className="space-y-6 animate-fade-in flex flex-col h-full">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Kelola Program Utama</h2>
                            <p className="text-slate-500 text-sm">Manajemen modul dan kurikulum pelatihan yang ditawarkan lembaga.</p>
                        </div>
                        <button onClick={() => { resetFormProgram(); setActiveModal('program'); }} className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm">
                            <span className="material-symbols-outlined text-[18px]">add_circle</span> Tambah Program
                        </button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-1">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider">
                                        <th className="p-4 font-semibold w-16 text-center">Ikon</th>
                                        <th className="p-4 font-semibold">Nama Program</th>
                                        <th className="p-4 font-semibold">Deskripsi Singkat</th>
                                        <th className="p-4 font-semibold text-center">Modul Silabus</th>
                                        <th className="p-4 font-semibold text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {loadingPrograms ? (
                                        <tr><td colSpan="5" className="p-8 text-center text-slate-400">Memuat data...</td></tr>
                                    ) : programs.length === 0 ? (
                                        <tr><td colSpan="5" className="p-8 text-center text-slate-400">Belum ada program.</td></tr>
                                    ) : (
                                        programs.map(prog => (
                                            <tr key={prog.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-center">
                                                    <div className="w-10 h-10 bg-blue-100 text-blue-500 rounded-lg flex items-center justify-center mx-auto">
                                                        <span className="material-symbols-outlined">{prog.icon || 'auto_stories'}</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 font-bold text-slate-800">{prog.title}</td>
                                                <td className="p-4 text-slate-500 truncate max-w-xs">{prog.description}</td>
                                                <td className="p-4 text-center">
                                                    <span className="px-2 py-1 bg-slate-100 text-slate-500 rounded text-xs font-bold border border-slate-300">
                                                        {prog.modul_url ? 'Terlampir' : 'Kosong'}
                                                    </span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <div className="flex justify-center gap-2">
                                                        <button onClick={() => handleEditProgram(prog)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition-colors">
                                                            <span className="material-symbols-outlined text-[18px]">edit</span>
                                                        </button>
                                                        <button onClick={() => handleDeleteProgram(prog.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition-colors">
                                                            <span className="material-symbols-outlined text-[18px]">delete</span>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            // --- Render lainnya (masih mock) ---
            const renderProfil = () => <div className="p-4">Profil Lembaga (mock)</div>;
            const renderJadwal = () => <div className="p-4">Jadwal & Acara (mock)</div>;
            const renderPeserta = () => <div className="p-4">Data Peserta (mock)</div>;
            const renderPengajar = () => <div className="p-4">Data Pengajar (mock)</div>;
            const renderBerita = () => <div className="p-4">Berita & Artikel (mock)</div>;
            const renderGaleri = () => <div className="p-4">Galeri (mock)</div>;

            // --- Modal untuk Program ---
            const renderModal = () => {
                if (!activeModal) return null;
                let title = '';
                let content = null;

                if (activeModal === 'program' || activeModal === 'edit_program') {
                    const isEdit = activeModal === 'edit_program';
                    title = isEdit ? 'Edit Program' : 'Tambah Program';
                    content = (
                        <form onSubmit={handleSaveProgram} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Program</label>
                                <input 
                                    type="text" 
                                    value={formProgram.title} 
                                    onChange={(e) => setFormProgram({ ...formProgram, title: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                                    required 
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Deskripsi Singkat</label>
                                <textarea 
                                    rows="2" 
                                    value={formProgram.description} 
                                    onChange={(e) => setFormProgram({ ...formProgram, description: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                ></textarea>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Ikon (Material Icons)</label>
                                <input 
                                    type="text" 
                                    placeholder="Misal: ecg_heart" 
                                    value={formProgram.icon} 
                                    onChange={(e) => setFormProgram({ ...formProgram, icon: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                                />
                            </div>
                            <div className="pt-4 flex justify-end gap-3">
                                <button type="button" onClick={() => setActiveModal(null)} className="px-5 py-2 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button>
                                <button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-alo-blue hover:bg-blue-700 rounded-lg transition-colors">
                                    {isEdit ? 'Update' : 'Simpan'}
                                </button>
                            </div>
                        </form>
                    );
                }

                return (
                    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h3 className="font-bold text-lg text-slate-800">{title}</h3>
                                <button onClick={() => setActiveModal(null)} className="text-slate-400 hover:text-red-500 transition-colors">
                                    <span className="material-symbols-outlined">close</span>
                                </button>
                            </div>
                            <div className="p-6 overflow-y-auto custom-scrollbar">
                                {content}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-screen w-full bg-slate-100 overflow-hidden relative">
                    
                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="absolute top-6 right-8 z-[100] animate-fade-in">
                            <div className="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-slate-700">
                                <span className="material-symbols-outlined text-green-400">check_circle</span>
                                <span className="text-sm font-medium">{toastMessage}</span>
                            </div>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside className="w-64 bg-admin-sidebar text-slate-300 flex flex-col flex-shrink-0 shadow-xl z-20">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50 bg-admin-dark">
                            <span className="material-symbols-outlined text-alo-blue mr-2">admin_panel_settings</span>
                            <span className="font-bold text-white tracking-wide">CMS ADMIN</span>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-6 px-3 space-y-1">
                            <p className="px-3 text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
                            {menus.map(menu => (
                                <button 
                                    key={menu.id} 
                                    onClick={() => setActiveMenu(menu.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeMenu === menu.id ? 'bg-alo-blue text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <span className="material-symbols-outlined text-[20px]">{menu.icon}</span>
                                    {menu.label}
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-4 border-t border-slate-700/50">
                            <button className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium text-red-400 hover:bg-red-500/10">
                                <span className="material-symbols-outlined text-[20px]">logout</span>
                                Keluar Sistem
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-2 text-sm font-medium text-slate-500">
                                <span className="material-symbols-outlined text-[18px]">home</span> / <span className="text-alo-blue font-bold">{activeMenu}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <a href="index.html" target="_blank" className="flex items-center gap-2 bg-blue-50 text-alo-blue border border-blue-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-100 transition-colors shadow-sm">
                                    <span className="material-symbols-outlined text-[18px]">open_in_new</span> Lihat Website
                                </a>
                                <div className="h-6 w-px bg-slate-300 mx-2"></div>
                                <button className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 relative">
                                    <span className="material-symbols-outlined text-[20px]">notifications</span>
                                    <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                                </button>
                                <div className="flex items-center gap-2 pl-4 border-l border-slate-200">
                                    <div className="text-right hidden md:block">
                                        <p className="text-sm font-bold text-slate-800">Admin Pusat</p>
                                        <p className="text-xs text-slate-500">Super Administrator</p>
                                    </div>
                                    <div className="w-9 h-9 rounded-full bg-alo-blue text-white flex items-center justify-center font-bold shadow-md">A</div>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 bg-slate-50 custom-scrollbar">
                            {activeMenu === 'Dashboard' && renderDashboard()}
                            {activeMenu === 'Profil' && renderProfil()}
                            {activeMenu === 'Program' && renderProgram()}
                            {activeMenu === 'Jadwal' && renderJadwal()}
                            {activeMenu === 'Peserta' && renderPeserta()}
                            {activeMenu === 'Pengajar' && renderPengajar()}
                            {activeMenu === 'Berita' && renderBerita()}
                            {activeMenu === 'Galeri' && renderGaleri()}
                        </div>
                    </main>

                    {/* Render Modals */}
                    {renderModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
