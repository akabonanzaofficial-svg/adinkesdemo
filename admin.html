        // --- KOMPONEN CHARTS (dipisahkan agar tidak melanggar hooks) ---
        function DashboardCharts({ registrations, schedules }) {
            const chartRefs = useRef({});

            useEffect(() => {
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                const currentYear = new Date().getFullYear();
                const regPerMonth = Array(12).fill(0);
                const revPerMonth = Array(12).fill(0);

                registrations.forEach(reg => {
                    const date = new Date(reg.created_at);
                    if (date.getFullYear() === currentYear) {
                        const month = date.getMonth();
                        regPerMonth[month]++;
                        const schedule = schedules.find(s => s.id === reg.schedule_id);
                        if (schedule && schedule.price) {
                            const priceStr = schedule.price.replace(/[^0-9]/g, '');
                            if (priceStr) revPerMonth[month] += parseInt(priceStr);
                        }
                    }
                });

                // Hancurkan chart lama jika ada
                if (chartRefs.current.reg) { chartRefs.current.reg.destroy(); }
                if (chartRefs.current.rev) { chartRefs.current.rev.destroy(); }

                const ctxReg = document.getElementById('registrationsChart');
                const ctxRev = document.getElementById('revenueChart');

                if (ctxReg) {
                    chartRefs.current.reg = new Chart(ctxReg, {
                        type: 'bar',
                        data: {
                            labels: monthNames,
                            datasets: [{
                                label: 'Registrasi',
                                data: regPerMonth,
                                backgroundColor: 'rgba(30, 115, 190, 0.6)',
                                borderColor: '#1E73BE',
                                borderWidth: 1
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }
                if (ctxRev) {
                    chartRefs.current.rev = new Chart(ctxRev, {
                        type: 'line',
                        data: {
                            labels: monthNames,
                            datasets: [{
                                label: 'Pendapatan (Rp)',
                                data: revPerMonth,
                                backgroundColor: 'rgba(34, 197, 94, 0.2)',
                                borderColor: '#22c55e',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.3
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }

                return () => {
                    if (chartRefs.current.reg) chartRefs.current.reg.destroy();
                    if (chartRefs.current.rev) chartRefs.current.rev.destroy();
                };
            }, [registrations, schedules]);

            return null;
        }

        // --- KOMPONEN UTAMA ---
        function AdminDashboard() {
            const [activeMenu, setActiveMenu] = useState('Dashboard');
            const [jadwalTab, setJadwalTab] = useState('Pelatihan');
            const [activeModal, setActiveModal] = useState(null);
            const [toastMessage, setToastMessage] = useState('');
            const [loading, setLoading] = useState(true);

            // --- DATA STATE ---
            const [programs, setPrograms] = useState([]);
            const [schedules, setSchedules] = useState([]);
            const [instructors, setInstructors] = useState([]);
            const [news, setNews] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [users, setUsers] = useState([]);
            const [registrations, setRegistrations] = useState([]);
            const [profile, setProfile] = useState({});
            const [profileLoading, setProfileLoading] = useState(true);
            const [profileFormData, setProfileFormData] = useState({});

            // --- FORM STATE ---
            const [programForm, setProgramForm] = useState({ title: '', description: '', icon: 'auto_stories', modul_url: '' });
            const [editingProgramId, setEditingProgramId] = useState(null);
            const [scheduleForm, setScheduleForm] = useState({ category: 'Pelatihan', course: '', date: '', time: '', quota: '20 Peserta', price: 'Rp 0', status: 'Tersedia', img: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=800&h=400&q=80', description: '' });
            const [editingScheduleId, setEditingScheduleId] = useState(null);
            const [instructorForm, setInstructorForm] = useState({ name: '', role: '', img: 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=300&q=80' });
            const [editingInstructorId, setEditingInstructorId] = useState(null);
            const [sertifikatUrl, setSertifikatUrl] = useState('');
            const [sertifikatRegId, setSertifikatRegId] = useState(null);

            // --- EDITOR BERITA (Quill) ---
            const [editorTitle, setEditorTitle] = useState('');

            // --- RESET ---

            const resetInstructorForm = () => { setInstructorForm({ name: '', role: '', img: 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=300&q=80' }); setEditingInstructorId(null); };
            const resetSertifikatForm = () => { setSertifikatUrl(''); setSertifikatRegId(null); };

            // --- FETCH PROFILE ---
            const fetchProfile = async () => {
                setProfileLoading(true);
                const { data, error } = await supabase.from('institution_profile').select('*').eq('id', 1).single();

            };
            const updateProfile = async (updatedData) => {
                const { error } = await supabase.from('institution_profile').update(updatedData).eq('id', 1);

                showToast('Profil berhasil diperbarui!');
                await fetchProfile();
                return true;
            };
            useEffect(() => {
                setProfileFormData({

                    whatsapp: profile.whatsapp || '', email: profile.email || '', instagram: profile.instagram || ''
                });
            }, [profile]);

            // --- FETCH ALL ---
            useEffect(() => {
                async function fetchAllData() {
                    setLoading(true);
                    try {
                        const [programsRes, schedulesRes, instructorsRes, newsRes, galleryRes, usersRes, registrationsRes] = await Promise.all([
                            supabase.from('programs').select('*').order('id', { ascending: true }),

                            supabase.from('gallery').select('*').order('id', { ascending: true }),
                            supabase.from('users').select('*').eq('role', 'member').order('id', { ascending: true }),
                            supabase.from('registrations').select('*').order('id', { ascending: true }),
                        ]);
                        if (programsRes.error) console.error('Error programs:', programsRes.error); else setPrograms(programsRes.data || []);
                        if (schedulesRes.error) console.error('Error schedules:', schedulesRes.error); else setSchedules(schedulesRes.data || []);
                        if (instructorsRes.error) console.error('Error instructors:', instructorsRes.error); else setInstructors(instructorsRes.data || []);
                        if (newsRes.error) console.error('Error news:', newsRes.error); else setNews(newsRes.data || []);
                        if (galleryRes.error) console.error('Error gallery:', galleryRes.error); else setGallery(galleryRes.data || []);
                        if (usersRes.error) console.error('Error users:', usersRes.error); else setUsers(usersRes.data || []);
                        if (registrationsRes.error) console.error('Error registrations:', registrationsRes.error); else setRegistrations(registrationsRes.data || []);
                        await fetchProfile();
                    } catch (err) { console.error('Gagal fetch data:', err); } finally { setLoading(false); }
                }
                fetchAllData();
            }, []);

            // --- CRUD ---
            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 3000); };

                const { data: newData } = await supabase.from('programs').select('*').order('id', { ascending: true });
                setPrograms(newData);
                showToast('Program berhasil ditambahkan!');
            };
            const updateProgram = async (id, data) => {
                const { error } = await supabase.from('programs').update(data).eq('id', id);
                if (error) { showToast('Gagal update program: ' + error.message); return; }
                const { data: newData } = await supabase.from('programs').select('*').order('id', { ascending: true });
                setPrograms(newData);
                showToast('Program berhasil diperbarui!');
            };
            const deleteProgram = async (id) => {
                if (!confirm('Yakin ingin menghapus program ini?')) return;
                const { error } = await supabase.from('programs').delete().eq('id', id);
                if (error) { showToast('Gagal hapus program: ' + error.message); return; }
                setPrograms(programs.filter(p => p.id !== id));
                showToast('Program dihapus.');
            };

            const addSchedule = async (data) => {
                const { error } = await supabase.from('schedules').insert([data]);
                if (error) { showToast('Gagal tambah jadwal: ' + error.message); return; }
                const { data: newData } = await supabase.from('schedules').select('*').order('id', { ascending: true });
                setSchedules(newData);
                showToast('Jadwal berhasil ditambahkan!');
            };
            const updateSchedule = async (id, data) => {
                const { error } = await supabase.from('schedules').update(data).eq('id', id);
                if (error) { showToast('Gagal update jadwal: ' + error.message); return; }
                const { data: newData } = await supabase.from('schedules').select('*').order('id', { ascending: true });

            const addInstructor = async (data) => {

                                <canvas id="revenueChart" height="200"></canvas>
                            </div>
                        </div>

                        {/* Komponen chart dipanggil di sini agar tidak melanggar hooks */}
                        <DashboardCharts registrations={registrations} schedules={schedules} />
                    </div>
                );
            };

            // --- RENDER PROFIL ---
            const renderProfil = () => {
                const handleSubmit = async (e) => { e.preventDefault(); await updateProfile(profileFormData); };
                if (profileLoading) return (<div className="flex items-center justify-center h-full"><span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span><span className="ml-3 text-slate-500">Memuat profil...</span></div>);
                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-bold text-slate-800">Pengaturan Profil Lembaga</h2>
                            <button type="submit" form="profileForm" className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm"><span className="material-symbols-outlined text-[18px]">save</span> Simpan Perubahan</button>
                        </div>
                        <form id="profileForm" onSubmit={handleSubmit} className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">Identitas Utama</h3>
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lembaga</label><input type="text" value={profileFormData.name} onChange={(e) => setProfileFormData({ ...profileFormData, name: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Tagline</label><input type="text" value={profileFormData.tagline} onChange={(e) => setProfileFormData({ ...profileFormData, tagline: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-sm font-semibold text-slate-700 mb-1">Logo URL</label><input type="text" value={profileFormData.logo_url} onChange={(e) => setProfileFormData({ ...profileFormData, logo_url: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" /></div>
                                    <div><label className="block text-sm font-semibold text-slate-700 mb-1">Banner URL</label><input type="text" value={profileFormData.banner_url} onChange={(e) => setProfileFormData({ ...profileFormData, banner_url: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" /></div>
                                </div>
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Visi</label><textarea rows="2" value={profileFormData.visi} onChange={(e) => setProfileFormData({ ...profileFormData, visi: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea></div>
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Misi</label><textarea rows="3" value={profileFormData.misi} onChange={(e) => setProfileFormData({ ...profileFormData, misi: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea></div>
                            </div>
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                    <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">Informasi Kontak & Medsos</h3>
                                    <div><label className="block text-sm font-semibold text-slate-700 mb-1">Alamat Lengkap</label><textarea rows="2" value={profileFormData.alamat} onChange={(e) => setProfileFormData({ ...profileFormData, alamat: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-1">No. Telepon</label><input type="text" value={profileFormData.telepon} onChange={(e) => setProfileFormData({ ...profileFormData, telepon: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-1">WhatsApp</label><input type="text" value={profileFormData.whatsapp} onChange={(e) => setProfileFormData({ ...profileFormData, whatsapp: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-1">Email</label><input type="email" value={profileFormData.email} onChange={(e) => setProfileFormData({ ...profileFormData, email: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-1">Instagram URL</label><input type="text" value={profileFormData.instagram} onChange={(e) => setProfileFormData({ ...profileFormData, instagram: e.target.value })} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="text-lg font-bold text-slate-800">Struktur Organisasi</h3><button onClick={() => setActiveModal('struktur')} className="text-sm text-alo-blue font-bold flex items-center hover:underline"><span className="material-symbols-outlined text-[16px]">add</span> Tambah</button></div>
                                    <div className="space-y-3">
                                        {mockStruktur.map(item => (
                                            <div key={item.id} className="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-100 hover:border-blue-200 transition-colors">
                                                <div><p className="font-bold text-sm text-slate-800">{item.name}</p><p className="text-xs text-slate-500">{item.role}</p></div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setActiveModal('struktur')} className="text-blue-500 hover:bg-blue-100 p-1 rounded"><span className="material-symbols-outlined text-[18px]">edit</span></button>
                                                    <button onClick={() => showToast('Data dihapus.')} className="text-red-500 hover:bg-red-100 p-1 rounded"><span className="material-symbols-outlined text-[18px]">delete</span></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                );
            };

            // --- RENDER PROGRAM ---
            const renderProgram = () => (
                <div className="space-y-6 animate-fade-in flex flex-col h-full">
                    <div className="flex justify-between items-center">
                        <div><h2 className="text-2xl font-bold text-slate-800">Kelola Program Utama</h2><p className="text-slate-500 text-sm">Manajemen modul dan kurikulum pelatihan yang ditawarkan lembaga.</p></div>
                        <button onClick={() => openProgramModal()} className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm"><span className="material-symbols-outlined text-[18px]">add_circle</span> Tambah Program</button>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-1">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead><tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider"><th className="p-4 font-semibold w-16 text-center">Ikon</th><th className="p-4 font-semibold">Nama Program</th><th className="p-4 font-semibold">Deskripsi Singkat</th><th className="p-4 font-semibold text-center">Modul Silabus</th><th className="p-4 font-semibold text-center">Aksi</th></tr></thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {programs.map(prog => (<tr key={prog.id} className="hover:bg-slate-50 transition-colors"><td className="p-4 text-center"><div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center mx-auto"><span className="material-symbols-outlined">{prog.icon || 'auto_stories'}</span></div></td><td className="p-4 font-bold text-slate-800">{prog.title}</td><td className="p-4 text-slate-500 truncate max-w-xs">{prog.description}</td><td className="p-4 text-center">{prog.modul_url ? <span className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold">Terlampir</span> : <span className="px-2 py-1 bg-slate-100 text-slate-500 rounded text-xs font-bold border border-slate-300">Kosong</span>}</td><td className="p-4 text-center"><div className="flex justify-center gap-2"><button onClick={() => openProgramModal(prog)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">edit</span></button><button onClick={() => deleteProgram(prog.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">delete</span></button></div></td></tr>))}
                                    {programs.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Belum ada program. Klik "Tambah Program".</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            // --- RENDER JADWAL ---
            const renderJadwal = () => {
                const filtered = schedules.filter(s => s.category === jadwalTab);
                return (
                    <div className="space-y-6 animate-fade-in flex flex-col h-full">
                        <div className="flex justify-between items-center">
                            <div><h2 className="text-2xl font-bold text-slate-800">Kelola Jadwal & Acara</h2><p className="text-slate-500 text-sm">Atur ketersediaan tiket pelatihan, webinar, dan workshop.</p></div>
                            <button onClick={() => openScheduleModal()} className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm"><span className="material-symbols-outlined text-[18px]">add_circle</span> Tambah Jadwal Baru</button>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-1">
                            <div className="flex border-b border-slate-200 bg-slate-50 px-4 pt-4 gap-2">
                                {['Pelatihan', 'Webinar', 'Workshop'].map(tab => <button key={tab} onClick={() => setJadwalTab(tab)} className={`px-6 py-2.5 font-bold text-sm rounded-t-lg transition-colors ${jadwalTab === tab ? 'bg-white text-alo-blue border-t border-x border-slate-200 border-b-white translate-y-px' : 'text-slate-500 hover:bg-slate-100'}`}>{tab}</button>)}
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-white border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider"><th className="p-4 font-semibold w-16">Banner</th><th className="p-4 font-semibold">Nama Acara</th><th className="p-4 font-semibold">Tanggal & Waktu</th><th className="p-4 font-semibold w-48">Progres Kuota</th><th className="p-4 font-semibold text-center">Status</th><th className="p-4 font-semibold text-center">Aksi</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {filtered.map(sch => {
                                            const quotaNum = parseInt(sch.quota) || 20;
                                            const filled = 12;
                                            const percent = Math.min(100, Math.round((filled / quotaNum) * 100));
                                            return (
                                                <tr key={sch.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-4"><div className="w-16 h-10 rounded bg-slate-200 bg-cover bg-center" style={{ backgroundImage: `url('${sch.img || 'https://via.placeholder.com/200'}')` }}></div></td>
                                                    <td className="p-4"><p className="font-bold text-slate-800">{sch.course}</p><p className="text-slate-500 text-xs truncate max-w-xs">{sch.description}</p></td>
                                                    <td className="p-4"><p className="font-semibold text-slate-700">{sch.date}</p><p className="text-slate-500 text-xs">{sch.time}</p></td>
                                                    <td className="p-4">
                                                        <div className="flex justify-between text-xs mb-1"><span className="text-slate-500 font-medium">Terisi: {filled}/{quotaNum}</span><span className="font-bold text-alo-blue">{percent}%</span></div>
                                                        <div className="w-full bg-slate-200 rounded-full h-2"><div className="bg-alo-blue h-2 rounded-full" style={{ width: `${percent}%` }}></div></div>
                                                    </td>
                                                    <td className="p-4 text-center"><span className={`px-3 py-1 text-xs font-bold rounded-full ${sch.status === 'Tersedia' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{sch.status || 'Tersedia'}</span></td>
                                                    <td className="p-4 text-center">
                                                        <div className="flex justify-center gap-2">
                                                            <button onClick={() => openScheduleModal(sch)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">edit</span></button>
                                                            <button onClick={() => deleteSchedule(sch.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">delete</span></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {filtered.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-slate-400">Belum ada jadwal untuk kategori ini.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- RENDER PESERTA ---
            const renderPeserta = () => {
                const registrationsWithDetails = registrations.map(reg => {
                    const schedule = schedules.find(s => s.id === reg.schedule_id);
                    const user = users.find(u => u.id === reg.user_id);
                    return { ...reg, schedule, user };
                });
                return (
                    <div className="space-y-6 animate-fade-in flex flex-col h-full">
                        <div className="flex justify-between items-center">
                            <div><h2 className="text-2xl font-bold text-slate-800">Data Peserta & Registrasi</h2><p className="text-slate-500 text-sm">Kelola pendaftaran, verifikasi pembayaran, dan e-sertifikat peserta.</p></div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-1">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead><tr className="bg-white border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider"><th className="p-4 font-semibold">Data Peserta</th><th className="p-4 font-semibold">Program & Jadwal</th><th className="p-4 font-semibold text-center">Status Pembayaran</th><th className="p-4 font-semibold text-center">E-Sertifikat</th><th className="p-4 font-semibold text-center">Aksi</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {registrationsWithDetails.map(reg => (
                                            <tr key={reg.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4">
                                                    <p className="font-bold text-slate-800">{reg.nama_peserta || reg.user?.name || 'Tamu'}</p>
                                                    <p className="text-slate-500 text-xs flex items-center gap-1 mt-0.5"><span className="material-symbols-outlined text-[14px]">chat</span> {reg.whatsapp || reg.user?.phone || '-'}</p>
                                                </td>
                                                <td className="p-4">
                                                    <p className="font-semibold text-alo-blue">{reg.schedule?.course || 'Program tidak ditemukan'}</p>
                                                    <p className="text-slate-500 text-xs">{reg.schedule?.date || '-'}</p>
                                                </td>
                                                <td className="p-4 text-center">
                                                    {reg.status_pembayaran === 'Lunas' ? <span className="px-3 py-1 text-xs font-bold rounded-full bg-green-100 text-green-700 border border-green-200">Lunas</span>
                                                        : reg.status_pembayaran === 'Selesai' ? <span className="px-3 py-1 text-xs font-bold rounded-full bg-slate-100 text-slate-600 border border-slate-200">Selesai</span>
                                                            : <span className="px-3 py-1 text-xs font-bold rounded-full bg-orange-100 text-orange-700 border border-orange-200">Menunggu Cek</span>}
                                                </td>
                                                <td className="p-4 text-center">
                                                    {reg.sertifikat_url ? (
                                                        <div className="flex justify-center items-center gap-1"><span className="material-symbols-outlined text-green-500 text-[18px]">workspace_premium</span><span className="text-xs font-bold text-green-600">Tersedia</span></div>
                                                    ) : reg.status_pembayaran === 'Lunas' ? (
                                                        <button onClick={() => openSertifikatModal(reg)} className="px-3 py-1.5 bg-blue-50 text-alo-blue rounded border border-blue-200 hover:bg-blue-100 font-semibold text-xs flex items-center gap-1 mx-auto transition-colors"><span className="material-symbols-outlined text-[14px]">upload</span> Upload</button>
                                                    ) : <span className="text-slate-400 text-xs">-</span>}
                                                </td>
                                                <td className="p-4 text-center">
                                                    {reg.status_pembayaran === 'Menunggu Cek' || reg.status_pembayaran === 'Menunggu Pembayaran' ? (
                                                        <button onClick={() => approvePayment(reg.id)} className="px-3 py-1.5 bg-green-500 text-white rounded hover:bg-green-600 font-semibold text-xs flex items-center gap-1 mx-auto shadow-sm transition-colors"><span className="material-symbols-outlined text-[14px]">check_circle</span> Approve</button>
                                                    ) : reg.status_pembayaran === 'Lunas' && !reg.sertifikat_url ? (
                                                        <button onClick={() => openSertifikatModal(reg)} className="px-3 py-1.5 bg-blue-500 text-white rounded hover:bg-blue-600 font-semibold text-xs flex items-center gap-1 mx-auto shadow-sm transition-colors"><span className="material-symbols-outlined text-[14px]">upload</span> Upload</button>
                                                    ) : <span className="text-slate-400 text-xs">-</span>}
                                                </td>
                                            </tr>
                                        ))}
                                        {registrationsWithDetails.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Belum ada registrasi/pemesanan.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- RENDER PENGAJAR ---
            const renderPengajar = () => (
                <div className="space-y-6 animate-fade-in flex flex-col h-full">
                    <div className="flex justify-between items-center">
                        <div><h2 className="text-2xl font-bold text-slate-800">Data Pengajar / Instruktur</h2><p className="text-slate-500 text-sm">Kelola profil tenaga ahli yang akan ditampilkan di website publik.</p></div>
                        <button onClick={() => openInstructorModal()} className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm"><span className="material-symbols-outlined text-[18px]">person_add</span> Tambah Pengajar</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {instructors.map(inst => (
                            <div key={inst.id} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 text-center relative group">
                                <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1">
                                    <button onClick={() => openInstructorModal(inst)} className="bg-blue-50 text-blue-500 p-1.5 rounded hover:bg-blue-100"><span className="material-symbols-outlined text-[16px]">edit</span></button>
                                    <button onClick={() => deleteInstructor(inst.id)} className="bg-red-50 text-red-500 p-1.5 rounded hover:bg-red-100"><span className="material-symbols-outlined text-[16px]">delete</span></button>
                                </div>
                                <div className="w-24 h-24 mx-auto rounded-full overflow-hidden border-4 border-slate-50 shadow-md mb-4">
                                    <img src={inst.img} alt={inst.name} className="w-full h-full object-cover" />
                                </div>
                                <h3 className="font-bold text-slate-800 text-sm mb-1">{inst.name}</h3>
                                <p className="text-xs text-alo-blue font-medium">{inst.role}</p>
                            </div>
                        ))}
                        {instructors.length === 0 && <div className="col-span-4 text-center text-slate-400 py-12">Belum ada pengajar.</div>}
                    </div>
                </div>
            );

            // --- RENDER BERITA dengan Quill ---
            const renderBerita = () => {
                useEffect(() => {
                    if (containerRef.current && !quillRef.current) {
                        quillRef.current = new Quill(containerRef.current, {
                            theme: 'snow',
                            placeholder: 'Tulis konten artikel di sini...',
                            modules: {
                                toolbar: [
                                    [{ header: [1, 2, 3, false] }],
                                    ['bold', 'italic', 'underline', 'strike'],
                                    [{ list: 'ordered' }, { list: 'bullet' }],
                                    ['link', 'image'],
                                    ['clean']
                                ]
                            }
                        });
                        quillRef.current.on('text-change', () => {
                            setEditorContent(quillRef.current.root.innerHTML);
                        });
                    }
                    return () => {
                        if (quillRef.current) {
                            quillRef.current = null;
                        }
                    };
                }, [activeMenu]);

                useEffect(() => {
                    if (quillRef.current && editingNewsId) {
                        const item = news.find(n => n.id === editingNewsId);
                        if (item) {
                            quillRef.current.root.innerHTML = item.content || '';
                            setEditorContent(item.content || '');
                        }
                    } else if (quillRef.current && !editingNewsId) {
                        quillRef.current.root.innerHTML = '';
                        setEditorContent('');
                    }
                }, [editingNewsId, news]);

                const handlePublish = async () => {
                    if (!editorTitle.trim()) { showToast('Judul harus diisi.'); return; }
                    if (!editorContent.trim()) { showToast('Konten harus diisi.'); return; }
                    const data = {
                        title: editorTitle,
                        content: editorContent,
                        category: editorCategory,
                        date: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }),
                        img: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=500&q=80',
                    };
                    if (editingNewsId) {
                        await updateNews(editingNewsId, data);
                        setEditingNewsId(null);
                    } else {
                        await addNews(data);
                    }
                    setEditorTitle('');
                    setEditorContent('');
                    setEditorCategory('Berita Lembaga');
                    if (quillRef.current) {
                        quillRef.current.root.innerHTML = '';
                    }
                };

                const loadNewsToEditor = (item) => {
                    setEditorTitle(item.title);
                    setEditorContent(item.content || '');
                    setEditorCategory(item.category || 'Berita Lembaga');
                    setEditingNewsId(item.id);
                    if (quillRef.current) {
                        quillRef.current.root.innerHTML = item.content || '';
                    }
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                return (
                    <div className="space-y-6 animate-fade-in flex flex-col h-full">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col shrink-0">
                            <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <div>
                                    <h2 className="text-lg font-bold text-slate-800">Editor Berita / Artikel</h2>
                                    <p className="text-slate-500 text-xs">Tulis atau edit konten untuk dipublikasikan.</p>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={handlePublish} className="bg-alo-blue text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm">
                                        <span className="material-symbols-outlined text-[18px]">{editingNewsId ? 'edit' : 'publish'}</span> {editingNewsId ? 'Update' : 'Publikasikan'}
                                    </button>
                                </div>
                            </div>
                            <div className="p-5 border-b border-slate-100 flex gap-4">
                                <div className="flex-1">
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Judul Artikel</label>
                                    <input type="text" value={editorTitle} onChange={(e) => setEditorTitle(e.target.value)} placeholder="Masukkan judul berita..." className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none font-semibold text-slate-800" />
                                </div>
                                <div className="w-1/4">
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Kategori</label>
                                    <select value={editorCategory} onChange={(e) => setEditorCategory(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                                        <option>Berita Lembaga</option><option>Artikel Edukasi</option><option>Pengumuman</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex flex-col p-5">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Konten / Isi Artikel</label>
                                <div ref={containerRef} className="bg-white rounded-lg"></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden shrink-0">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center">
                                <h3 className="text-lg font-bold text-slate-800">Daftar Artikel Tersimpan</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider"><th className="p-4 font-semibold w-16">Banner</th><th className="p-4 font-semibold">Judul Artikel</th><th className="p-4 font-semibold">Kategori</th><th className="p-4 font-semibold">Tanggal</th><th className="p-4 font-semibold text-center">Aksi</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {news.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4"><div className="w-16 h-10 rounded bg-slate-200 bg-cover bg-center" style={{ backgroundImage: `url('${item.img}')` }}></div></td>
                                                <td className="p-4 font-bold text-slate-800">{item.title}</td>
                                                <td className="p-4 text-slate-500">{item.category}</td>
                                                <td className="p-4 text-slate-500">{item.date}</td>
                                                <td className="p-4 text-center">
                                                    <div className="flex justify-center gap-2">
                                                        <button onClick={() => loadNewsToEditor(item)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">edit</span></button>
                                                        <button onClick={() => deleteNews(item.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition-colors"><span className="material-symbols-outlined text-[18px]">delete</span></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                        {news.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Belum ada berita.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- RENDER GALERI ---
            const renderGaleri = () => {
                const handleUpload = () => {
                    if (!galleryUrl.trim()) { showToast('Masukkan URL gambar.'); return; }
                    addGallery(galleryUrl.trim());
                    setGalleryUrl('');
                };
                return (
                    <div className="space-y-6 animate-fade-in flex flex-col h-full">
                        <div className="flex justify-between items-center">
                            <div><h2 className="text-2xl font-bold text-slate-800">Manajemen Galeri</h2><p className="text-slate-500 text-sm">Unggah dokumentasi foto kegiatan untuk ditampilkan di website.</p></div>
                            <div className="flex gap-2">
                                <input type="text" value={galleryUrl} onChange={(e) => setGalleryUrl(e.target.value)} placeholder="URL Gambar" className="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none w-64 text-sm" />
                                <button onClick={handleUpload} className="bg-alo-blue text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 shadow-sm"><span className="material-symbols-outlined text-[18px]">cloud_upload</span> Upload</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            {gallery.map(item => (
                                <div key={item.id} className="bg-slate-200 rounded-xl aspect-square relative group overflow-hidden shadow-sm border border-slate-200">
                                    <img src={item.img_url} alt="Galeri" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                                        <button onClick={() => deleteGallery(item.id)} className="bg-white text-red-500 w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors" title="Hapus"><span className="material-symbols-outlined text-[16px]">delete</span></button>
                                    </div>
                                </div>
                            ))}
                            {gallery.length === 0 && <div className="col-span-full text-center text-slate-400 py-12">Belum ada foto galeri.</div>}
                        </div>
                    </div>
                );
            };

            // --- MODAL ---
            const renderModal = () => {
                if (!activeModal) return null;
                let title = '', content = null, onSave = null, saveLabel = 'Simpan';
                const closeModal = () => { setActiveModal(null); resetProgramForm(); resetScheduleForm(); resetInstructorForm(); resetSertifikatForm(); };

                if (activeModal === 'program') {
                    const isEdit = editingProgramId !== null;
                    title = isEdit ? 'Edit Program Utama' : 'Tambah Program Utama';
                    content = (
                        <div className="space-y-4">
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Program</label><input type="text" value={programForm.title} onChange={(e) => setProgramForm({ ...programForm, title: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Deskripsi</label><textarea rows="2" value={programForm.description} onChange={(e) => setProgramForm({ ...programForm, description: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none"></textarea></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Ikon (Material Icons)</label><input type="text" value={programForm.icon} onChange={(e) => setProgramForm({ ...programForm, icon: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">URL Modul (opsional)</label><input type="text" value={programForm.modul_url} onChange={(e) => setProgramForm({ ...programForm, modul_url: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                        </div>
                    );
                    onSave = async () => { if (isEdit) { await updateProgram(editingProgramId, programForm); } else { await addProgram(programForm); } closeModal(); };
                } else if (activeModal === 'schedule') {
                    const isEdit = editingScheduleId !== null;
                    title = isEdit ? 'Edit Jadwal' : 'Tambah Jadwal';
                    content = (
                        <div className="space-y-4">
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Acara</label><input type="text" value={scheduleForm.course} onChange={(e) => setScheduleForm({ ...scheduleForm, course: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-semibold text-slate-700 mb-1">Kategori</label><select value={scheduleForm.category} onChange={(e) => setScheduleForm({ ...scheduleForm, category: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none bg-white"><option>Pelatihan</option><option>Webinar</option><option>Workshop</option></select></div><div><label className="block text-sm font-semibold text-slate-700 mb-1">Tanggal</label><input type="text" value={scheduleForm.date} onChange={(e) => setScheduleForm({ ...scheduleForm, date: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div></div>
                            <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-semibold text-slate-700 mb-1">Waktu</label><input type="text" value={scheduleForm.time} onChange={(e) => setScheduleForm({ ...scheduleForm, time: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div><div><label className="block text-sm font-semibold text-slate-700 mb-1">Kuota</label><input type="text" value={scheduleForm.quota} onChange={(e) => setScheduleForm({ ...scheduleForm, quota: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div></div>
                            <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-semibold text-slate-700 mb-1">Harga</label><input type="text" value={scheduleForm.price} onChange={(e) => setScheduleForm({ ...scheduleForm, price: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div><div><label className="block text-sm font-semibold text-slate-700 mb-1">Status</label><select value={scheduleForm.status} onChange={(e) => setScheduleForm({ ...scheduleForm, status: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none bg-white"><option>Tersedia</option><option>Hampir Penuh</option><option>Penuh</option></select></div></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">URL Gambar</label><input type="text" value={scheduleForm.img} onChange={(e) => setScheduleForm({ ...scheduleForm, img: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Deskripsi</label><textarea rows="3" value={scheduleForm.description} onChange={(e) => setScheduleForm({ ...scheduleForm, description: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none"></textarea></div>
                        </div>
                    );
                    onSave = async () => { if (isEdit) { await updateSchedule(editingScheduleId, scheduleForm); } else { await addSchedule(scheduleForm); } closeModal(); };
                } else if (activeModal === 'instructor') {
                    const isEdit = editingInstructorId !== null;
                    title = isEdit ? 'Edit Pengajar' : 'Tambah Pengajar';
                    content = (
                        <div className="space-y-4">
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label><input type="text" value={instructorForm.name} onChange={(e) => setInstructorForm({ ...instructorForm, name: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Peran / Spesialisasi</label><input type="text" value={instructorForm.role} onChange={(e) => setInstructorForm({ ...instructorForm, role: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">URL Foto</label><input type="text" value={instructorForm.img} onChange={(e) => setInstructorForm({ ...instructorForm, img: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                        </div>
                    );
                    onSave = async () => { if (isEdit) { await updateInstructor(editingInstructorId, instructorForm); } else { await addInstructor(instructorForm); } closeModal(); };
                } else if (activeModal === 'sertifikat') {
                    title = 'Upload E-Sertifikat';
                    content = (
                        <div className="space-y-4">
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-4"><p className="text-sm text-slate-500">Peserta</p><p className="font-bold text-slate-800">{registrations.find(r => r.id === sertifikatRegId)?.nama_peserta || 'Unknown'}</p></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-2">URL Sertifikat (PDF/JPG)</label><input type="text" value={sertifikatUrl} onChange={(e) => setSertifikatUrl(e.target.value)} placeholder="https://..." className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                        </div>
                    );
                    onSave = async () => { if (!sertifikatUrl.trim()) { showToast('Masukkan URL sertifikat.'); return; } await uploadCertificate(sertifikatRegId, sertifikatUrl.trim()); closeModal(); };
                    saveLabel = 'Upload';
                } else if (activeModal === 'struktur') {
                    title = 'Tambah Struktur Organisasi';
                    content = (<div className="space-y-4"><div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div><div><label className="block text-sm font-semibold text-slate-700 mb-1">Jabatan</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div></div>);
                    onSave = () => { showToast('Struktur ditambahkan (mock)'); closeModal(); };
                }
                if (!content) return null;
                return (
                    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 className="font-bold text-lg text-slate-800">{title}</h3><button onClick={closeModal} className="text-slate-400 hover:text-red-500 transition-colors"><span className="material-symbols-outlined">close</span></button></div>
                            <div className="p-6 overflow-y-auto custom-scrollbar">{content}</div>
                            <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3"><button onClick={closeModal} className="px-5 py-2 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button><button onClick={onSave} className="px-5 py-2 text-sm font-bold text-white bg-alo-blue hover:bg-blue-700 rounded-lg transition-colors">{saveLabel}</button></div>
                        </div>
                    </div>
                );
            };

            // --- MENU ---
            const menus = [
                { id: 'Dashboard', icon: 'dashboard', label: 'Ringkasan' },
                { id: 'Profil', icon: 'corporate_fare', label: 'Profil Lembaga' },
                { id: 'Program', icon: 'auto_stories', label: 'Program Utama' },
                { id: 'Jadwal', icon: 'calendar_month', label: 'Jadwal & Acara' },
                { id: 'Peserta', icon: 'groups', label: 'Data Peserta' },
                { id: 'Pengajar', icon: 'badge', label: 'Data Pengajar' },
                { id: 'Berita', icon: 'newspaper', label: 'Berita & Artikel' },
                { id: 'Galeri', icon: 'photo_library', label: 'Galeri Kegiatan' },
            ];

            // --- RENDER ---
            return (
                <div className="flex h-screen w-full bg-slate-100 overflow-hidden relative">
                    {toastMessage && (
                        <div className="absolute top-6 right-8 z-[100] animate-fade-in">
                            <div className="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-slate-700">
                                <span className="material-symbols-outlined text-green-400">check_circle</span>
                                <span className="text-sm font-medium">{toastMessage}</span>
                            </div>
                        </div>
                    )}
                    <aside className="w-64 bg-admin-sidebar text-slate-300 flex flex-col flex-shrink-0 shadow-xl z-20">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50 bg-admin-dark">
                            <span className="material-symbols-outlined text-alo-blue mr-2">admin_panel_settings</span>
                            <span className="font-bold text-white tracking-wide">CMS ADMIN</span>
                        </div>
                        <div className="flex-1 overflow-y-auto py-6 px-3 space-y-1">
                            <p className="px-3 text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
                            {menus.map(menu => (
                                <button key={menu.id} onClick={() => setActiveMenu(menu.id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeMenu === menu.id ? 'bg-alo-blue text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-[20px]">{menu.icon}</span> {menu.label}
                                </button>
                            ))}
                        </div>
                        <div className="p-4 border-t border-slate-700/50">
                            <button className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium text-red-400 hover:bg-red-500/10">
                                <span className="material-symbols-outlined text-[20px]">logout</span> Keluar Sistem
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-2 text-sm font-medium text-slate-500"><span className="material-symbols-outlined text-[18px]">home</span> / <span className="text-alo-blue font-bold">{activeMenu}</span></div>
                            <div className="flex items-center gap-4">
                                <a href="index.html" target="_blank" className="flex items-center gap-2 bg-blue-50 text-alo-blue border border-blue-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-100 transition-colors shadow-sm"><span className="material-symbols-outlined text-[18px]">open_in_new</span> Lihat Website</a>
                                <div className="h-6 w-px bg-slate-300 mx-2"></div>
                                <button className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 relative"><span className="material-symbols-outlined text-[20px]">notifications</span><span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span></button>
                                <div className="flex items-center gap-2 pl-4 border-l border-slate-200">
                                    <div className="text-right hidden md:block"><p className="text-sm font-bold text-slate-800">Admin Pusat</p><p className="text-xs text-slate-500">Super Administrator</p></div>
                                    <div className="w-9 h-9 rounded-full bg-alo-blue text-white flex items-center justify-center font-bold shadow-md">A</div>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 bg-slate-50 custom-scrollbar">
                            {loading ? (
                                <div className="flex items-center justify-center h-full"><span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span><span className="ml-3 text-slate-500">Memuat data...</span></div>
                            ) : (
                                <>
                                    {activeMenu === 'Dashboard' && renderDashboard()}
                                    {activeMenu === 'Profil' && renderProfil()}
                                    {activeMenu === 'Program' && renderProgram()}
                                    {activeMenu === 'Jadwal' && renderJadwal()}
                                    {activeMenu === 'Peserta' && renderPeserta()}
                                    {activeMenu === 'Pengajar' && renderPengajar()}
                                    {activeMenu === 'Berita' && renderBerita()}
                                    {activeMenu === 'Galeri' && renderGaleri()}
                                </>
                            )}
                        </div>
                    </main>
                    {renderModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
