<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADINKESTC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'alo-blue': '#1E73BE' },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .group:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu { opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease-in-out; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE ---
        const supabaseUrl = 'https://ciigcaudmesmtgznyoga.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpaWdjYXVkbWVzbXRnem55b2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODE3ODMsImV4cCI6MjA5ODU1Nzc4M30.YvJsAghqgb1RnXrJGVZQgl1veHj-75_ewpkmNBXpZfQ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // --- GALLERY (masih mock, bisa diintegrasikan nanti) ---
        const galleryList = [
            'https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1551076805-e1869043e560?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1527613426401-41d44465a3a5?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1584982751601-971dc37d6202?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1631815588090-d4bfec5b1ccb?auto=format&fit=crop&w=600&q=80'
        ];

        // --- KOMPONEN UTAMA ---
        function App() {
            const [activeTab, setActiveTab] = useState('Beranda');
            const [scheduleCategory, setScheduleCategory] = useState('Pelatihan');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [expandedScheduleId, setExpandedScheduleId] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [isBooked, setIsBooked] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [shareModalData, setShareModalData] = useState({ isOpen: false, title: '', url: '', type: 'course' });
            const [copySuccess, setCopySuccess] = useState('');
            const [articleModal, setArticleModal] = useState({ isOpen: false, title: '', content: '', img: '', category: '', date: '' });

            // --- STATE DATA ---
            const [programs, setPrograms] = useState([]);
            const [loading, setLoading] = useState(true);
            const [profile, setProfile] = useState(null);
            const [profileLoading, setProfileLoading] = useState(true);
            const [schedules, setSchedules] = useState([]);
            const [schedulesLoading, setSchedulesLoading] = useState(true);
            const [instructors, setInstructors] = useState([]);
            const [instructorsLoading, setInstructorsLoading] = useState(true);
            const [news, setNews] = useState([]);
            const [newsLoading, setNewsLoading] = useState(true);
            const [struktur, setStruktur] = useState([]);
            const [strukturLoading, setStrukturLoading] = useState(true);

            // --- CEK URL PARAM ---
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('tab') === 'jadwal') {
                    setActiveTab('Jadwal');
                }
            }, []);

            // --- FETCH DATA ---
            useEffect(() => {
                async function fetchPrograms() {
                    setLoading(true);
                    const { data, error } = await supabase.from('programs').select('*').order('id', { ascending: true });
                    if (error) { console.error('Error fetching programs:', error); setPrograms([]); } else { setPrograms(data); }
                    setLoading(false);
                }
                fetchPrograms();
            }, []);

            useEffect(() => {
                async function fetchProfile() {
                    const { data, error } = await supabase.from('institution_profile').select('*').eq('id', 1).single();
                    if (error) { console.error('Error fetching profile:', error); setProfile(null); } else { setProfile(data); }
                    setProfileLoading(false);
                }
                fetchProfile();
            }, []);

            useEffect(() => {
                async function fetchSchedules() {
                    setSchedulesLoading(true);
                    const { data, error } = await supabase.from('schedules').select('*').order('id', { ascending: true });
                    if (error) { console.error('Error fetching schedules:', error); setSchedules([]); } else { setSchedules(data || []); }
                    setSchedulesLoading(false);
                }
                fetchSchedules();
            }, []);

            useEffect(() => {
                async function fetchInstructors() {
                    setInstructorsLoading(true);
                    const { data, error } = await supabase.from('instructors').select('*').order('id', { ascending: true });
                    if (error) { console.error('Error fetching instructors:', error); setInstructors([]); } else { setInstructors(data || []); }
                    setInstructorsLoading(false);
                }
                fetchInstructors();
            }, []);

            useEffect(() => {
                async function fetchNews() {
                    setNewsLoading(true);
                    const { data, error } = await supabase.from('news').select('*').order('id', { ascending: false });
                    if (error) { console.error('Error fetching news:', error); setNews([]); } else { setNews(data || []); }
                    setNewsLoading(false);
                }
                fetchNews();
            }, []);

            // --- FETCH STRUKTUR ORGANISASI ---
            useEffect(() => {
                async function fetchStruktur() {
                    setStrukturLoading(true);
                    const { data, error } = await supabase
                        .from('organization_structure')
                        .select('*')
                        .order('order', { ascending: true });
                    if (error) { console.error('Error fetching struktur:', error); setStruktur([]); } else { setStruktur(data || []); }
                    setStrukturLoading(false);
                }
                fetchStruktur();
            }, []);

            // --- NAVIGASI ---
            const navigateToSchedule = (category) => {
                setScheduleCategory(category);
                setActiveTab('Jadwal');
                setIsMobileMenuOpen(false);
                setExpandedScheduleId(null);
                const url = new URL(window.location);
                url.searchParams.set('tab', 'jadwal');
                window.history.pushState({}, '', url);
                window.scrollTo(0, 0);
            };

            // --- BOOKING ---
            const handleBookingClick = (course) => {
                setSelectedCourse(course);
                setIsModalOpen(true);
                setIsBooked(false);
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                if (isSubmitting) return;
                setIsSubmitting(true);

                const form = e.target;
                const nama = form.nama.value.trim();
                const wa = form.wa.value.trim();

                if (!nama || !wa) {
                    alert('Harap isi semua field.');
                    setIsSubmitting(false);
                    return;
                }

                const { data, error } = await supabase
                    .from('registrations')
                    .insert([{
                        schedule_id: selectedCourse.id,
                        nama_peserta: nama,
                        whatsapp: wa,
                        status_pembayaran: 'Menunggu Pembayaran',
                    }]);

                if (error) {
                    console.error('Error saving registration:', error);
                    alert('Gagal menyimpan pemesanan. Silakan coba lagi.');
                    setIsSubmitting(false);
                    return;
                }

                setIsBooked(true);
                setIsSubmitting(false);
                setTimeout(() => {
                    setIsModalOpen(false);
                    setIsBooked(false);
                }, 3000);
            };

            // --- SHARE ---
            const openShareModal = (title, type = 'course') => {
                let url = window.location.href;
                if (type === 'course') {
                    const base = window.location.origin + window.location.pathname;
                    url = base + '?tab=jadwal';
                }
                setShareModalData({ isOpen: true, title, url, type });
                setCopySuccess('');
            };

            const closeShareModal = () => setShareModalData({ ...shareModalData, isOpen: false });

            const handleShareAction = (platform) => {
                let text = '';
                if (shareModalData.type === 'news') {
                    text = encodeURIComponent(`Halo! Coba baca artikel menarik ini: "${shareModalData.title}" dari ADINKESTC.`);
                } else {
                    text = encodeURIComponent(`Halo! Saya tertarik dengan ${shareModalData.title} di ADINKESTC. Cek jadwal lengkapnya di website mereka!`);
                }
                const url = encodeURIComponent(shareModalData.url);
                if (platform === 'whatsapp') {
                    window.open(`https://api.whatsapp.com/send?text=${text}%20${url}`, '_blank');
                } else if (platform === 'facebook') {
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
                } else if (platform === 'twitter') {
                    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
                }
            };

            const handleCopyLink = () => {
                try {
                    const input = document.createElement('input');
                    input.setAttribute('value', shareModalData.url);
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    setCopySuccess('Tautan disalin!');
                    setTimeout(() => setCopySuccess(''), 2000);
                } catch (err) {
                    setCopySuccess('Gagal menyalin');
                }
            };

            // --- TOGGLE DESKRIPSI ---
            const toggleDescription = (id) => {
                setExpandedScheduleId(expandedScheduleId === id ? null : id);
            };

            // --- BUKA ARTIKEL ---
            const openArticle = (item) => {
                setArticleModal({
                    isOpen: true,
                    title: item.title,
                    content: item.content || 'Belum ada konten lengkap untuk artikel ini.',
                    img: item.img,
                    category: item.category,
                    date: item.date
                });
            };

            const closeArticle = () => setArticleModal({ ...articleModal, isOpen: false });

            // --- HERO ACTIONS ---
            const heroActions = [
                { id: 'pelatihan', label: 'Pelatihan', icon: 'school', color: 'text-blue-500', action: () => navigateToSchedule('Pelatihan') },
                { id: 'webinar', label: 'Webinar', icon: 'videocam', color: 'text-pink-500', action: () => navigateToSchedule('Webinar') },
                { id: 'jadwal', label: 'Cek Jadwal', icon: 'calendar_month', color: 'text-orange-500', action: () => navigateToSchedule('Pelatihan') },
                { id: 'program', label: 'Silabus', icon: 'auto_stories', color: 'text-blue-500', action: () => setActiveTab('Program') }
            ];

            const getIconStyle = (icon) => {
                const mapping = {
                    'ecg_heart': { color: 'text-red-500', bg: 'bg-red-50' },
                    'info': { color: 'text-blue-500', bg: 'bg-blue-50' },
                    'group': { color: 'text-teal-500', bg: 'bg-teal-50' },
                    'check_circle': { color: 'text-purple-500', bg: 'bg-purple-50' },
                };
                return mapping[icon] || { color: 'text-slate-500', bg: 'bg-slate-50' };
            };

            // --- RENDER CONTENT ---
            const renderContent = () => {
                switch (activeTab) {
                    case 'Beranda':
                        return (
                            <div className="animate-fade-in pb-12 w-full max-w-none px-0">
                                <section className="bg-alo-blue pt-12 pb-0 px-6 relative overflow-hidden">
                                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-end">
                                        <div className="w-full md:w-3/5 pb-20 pt-5 z-10 text-center md:text-left">
                                            <h1 className="text-4xl md:text-5xl lg:text-[54px] font-bold text-white mb-4 leading-tight tracking-tight">Adinkes Training Center</h1>
                                            <p className="text-xl text-blue-100 mb-0 font-medium">Lembaga Pelatihan dan Edukasi Medis Terpercaya di Indonesia</p>
                                            <p className="text-xl text-blue-100 mb-12 font-medium">Terakreditasi A (Paripurna) Kemenkes RI</p>
                                            <div className="flex flex-wrap justify-center md:justify-start gap-6 md:gap-10">
                                                {heroActions.map(action => (
                                                    <div key={action.id} className="flex flex-col items-center cursor-pointer group" onClick={action.action}>
                                                        <div className="w-16 h-16 md:w-20 md:h-20 bg-white rounded-full flex items-center justify-center relative transition-transform transform group-hover:scale-105 shadow-md">
                                                            <div className="absolute inset-0 rounded-full border-[5px] border-white/30 scale-110 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                                            <span className={`material-symbols-outlined text-[32px] md:text-[40px] icon-filled ${action.color}`}>{action.icon}</span>
                                                        </div>
                                                        <span className="text-white font-semibold text-sm md:text-base mt-4 transition-colors group-hover:text-blue-100">{action.label}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-full md:w-2/5 flex justify-center md:justify-end relative">
                                            <img 
                                                src="https://images.unsplash.com/photo-1537368910025-700350fe46c7?auto=format&fit=crop&w=700&q=80" 
                                                alt="Tenaga Medis" 
                                                className="h-[350px] md:h-[450px] object-cover object-top filter brightness-105 rounded-t-[100px] md:rounded-none md:rounded-tl-[100px]"
                                                style={{ maskImage: 'linear-gradient(to top, transparent 0%, black 15%)', WebkitMaskImage: 'linear-gradient(to top, transparent 0%, black 15%)' }}
                                            />
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-slate-50 px-6 py-16">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="flex justify-between items-end mb-8">
                                            <div>
                                                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">Info Kesehatan & Artikel</h2>
                                                <p className="text-slate-500 text-sm md:text-base">Wawasan terbaru dari pakar kesehatan kami.</p>
                                            </div>
                                            <button onClick={() => setActiveTab('Berita')} className="hidden md:flex text-alo-blue font-bold items-center gap-1 hover:text-blue-800 transition-colors">
                                                Lihat Semua <span className="material-symbols-outlined text-[20px]">arrow_forward</span>
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {newsLoading ? (
                                                <div className="col-span-full text-center py-8">
                                                    <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                                    <p className="text-slate-500 mt-2">Memuat berita...</p>
                                                </div>
                                            ) : news.length === 0 ? (
                                                <div className="col-span-full text-center py-8 text-slate-400">Belum ada berita.</div>
                                            ) : (
                                                news.slice(0, 4).map((item) => (
                                                    <div key={item.id} onClick={() => openArticle(item)} className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-slate-100 group cursor-pointer flex flex-col">
                                                        <div className="h-44 overflow-hidden relative">
                                                            <img src={item.img} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                                        </div>
                                                        <div className="p-5 flex flex-col flex-grow">
                                                            <div className="flex justify-between items-center mb-3">
                                                                <span className="text-[10px] font-bold tracking-wider uppercase text-alo-blue bg-blue-50 px-2 py-1 rounded">{item.category}</span>
                                                                <span className="text-xs text-slate-400 font-medium">{item.date}</span>
                                                            </div>
                                                            <h3 className="text-base font-bold text-slate-800 group-hover:text-alo-blue transition-colors line-clamp-3 mb-4 leading-snug">{item.title}</h3>
                                                            <div className="mt-auto flex justify-between items-center border-t border-slate-100 pt-3">
                                                                <span className="text-sm text-alo-blue font-semibold flex items-center gap-1 group-hover:text-blue-800">Baca <span className="material-symbols-outlined text-[16px]">chevron_right</span></span>
                                                                <button onClick={(e) => { e.stopPropagation(); openShareModal(item.title, 'news'); }} className="text-slate-400 hover:text-alo-blue p-1.5 -mr-1.5 rounded-full hover:bg-blue-50 transition-colors" title="Bagikan Artikel">
                                                                    <span className="material-symbols-outlined text-[18px]">share</span>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </section>
                            </div>
                        );

                    case 'Profil':
                        if (profileLoading || strukturLoading) {
                            return (
                                <div className="animate-fade-in max-w-5xl mx-auto px-6 py-12 text-center">
                                    <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                    <p className="text-slate-500 mt-4">Memuat profil lembaga...</p>
                                </div>
                            );
                        }
                        if (!profile) {
                            return <div className="p-12 text-center text-slate-500">Profil belum tersedia.</div>;
                        }
                        return (
                            <div className="animate-fade-in max-w-5xl mx-auto space-y-16 px-6 py-12">
                                <div className="text-center">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-4">Profil Lembaga</h2>
                                    <div className="w-20 h-1 bg-alo-blue mx-auto rounded-full mb-8"></div>
                                </div>
                                {profile.logo_url && (
                                    <div className="flex justify-center mb-6">
                                        <img src={profile.logo_url} alt="Logo Lembaga" className="max-h-32 w-auto object-contain" />
                                    </div>
                                )}
                                <div className="flex flex-col md:flex-row gap-12 items-center">
                                    <div className="w-full md:w-1/2">
                                        <img src={profile.banner_url || "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=800&q=80"} alt="Gedung Lembaga" className="rounded-3xl shadow-xl w-full object-cover h-[400px]" />
                                    </div>
                                    <div className="w-full md:w-1/2 space-y-6 text-slate-600 leading-relaxed">
                                        <h3 className="text-2xl font-bold text-blue-900">{profile.name || 'Medika Edukasi Nusantara'}</h3>
                                        <p>{profile.tagline || 'Layanan Booking Pelatihan dan Edukasi Medis Terbaik di Indonesia'}</p>
                                        <div className="bg-blue-50 p-6 rounded-2xl border-l-4 border-alo-blue">
                                            <h4 className="font-bold text-blue-900 mb-2 text-lg">Visi Kami</h4>
                                            <p>{profile.visi || 'Menjadi pusat inovasi dan edukasi kesehatan terkemuka di Asia Tenggara.'}</p>
                                        </div>
                                        <div className="bg-blue-50 p-6 rounded-2xl border-l-4 border-teal-500">
                                            <h4 className="font-bold text-blue-900 mb-2 text-lg">Misi</h4>
                                            <p className="whitespace-pre-line">{profile.misi || '1. Menyelenggarakan pelatihan berbasis kompetensi...\n2. Membangun ekosistem belajar digital...'}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-12 border-t border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-alo-blue">location_on</span> Alamat</h4>
                                        <p className="text-slate-600">{profile.alamat || 'Gd. Kesehatan Lt.3, Jl. Merdeka No. 99, Kebayoran, Jakarta Selatan 12345'}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-alo-blue">contact_mail</span> Kontak</h4>
                                        <div className="space-y-2 text-sm text-slate-600">
                                            <p><span className="font-semibold">Telepon:</span> {profile.telepon || '-'}</p>
                                            <p><span className="font-semibold">WhatsApp:</span> {profile.whatsapp || '-'}</p>
                                            <p><span className="font-semibold">Email:</span> {profile.email || '-'}</p>
                                            <p><span className="font-semibold">Instagram:</span> <a href={profile.instagram || '#'} target="_blank" className="text-alo-blue hover:underline">{profile.instagram || '-'}</a></p>
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-12 border-t border-slate-200">
                                    <div className="text-center mb-10 max-w-2xl mx-auto">
                                        <h3 className="text-2xl font-bold text-slate-800 mb-3">Susunan Organisasi</h3>
                                        <p className="text-slate-500 leading-relaxed">Keberhasilan lembaga kami didukung oleh jajaran pimpinan dan manajemen yang kompeten, berdedikasi tinggi, serta memiliki pengalaman puluhan tahun.</p>
                                    </div>
                                    {strukturLoading ? (
                                        <div className="text-center py-8">
                                            <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                            <p className="text-slate-500 mt-2">Memuat struktur organisasi...</p>
                                        </div>
                                    ) : struktur.length === 0 ? (
                                        <p className="text-center text-slate-400">Belum ada data struktur organisasi.</p>
                                    ) : (
                                        <div className="flex flex-col items-center space-y-8">
                                            {struktur.length > 0 && (
                                                <div className="w-full max-w-sm bg-white p-6 rounded-2xl shadow-md border border-slate-100 text-center relative">
                                                    <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 w-12 h-12 bg-alo-blue rounded-full flex items-center justify-center text-white shadow-lg">
                                                        <span className="material-symbols-outlined text-[24px]">group</span>
                                                    </div>
                                                    <h4 className="text-lg font-bold text-slate-800 mt-4">{struktur[0]?.name}</h4>
                                                    <p className="text-alo-blue font-semibold text-sm">{struktur[0]?.role}</p>
                                                </div>
                                            )}
                                            {struktur.length > 1 && (
                                                <>
                                                    <div className="w-px h-8 bg-slate-300"></div>
                                                    <div className="w-full max-w-2xl h-px bg-slate-300 relative">
                                                        <div className="absolute left-0 top-0 w-px h-8 bg-slate-300"></div>
                                                        <div className="absolute right-0 top-0 w-px h-8 bg-slate-300"></div>
                                                        <div className="absolute left-1/2 top-0 w-px h-8 bg-slate-300"></div>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl pt-8">
                                                        {struktur.slice(1).map(person => (
                                                            <div key={person.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 text-center hover:shadow-md transition-shadow">
                                                                <h4 className="font-bold text-slate-800">{person.name}</h4>
                                                                <p className="text-teal-600 text-sm mt-1">{person.role}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        );

                    case 'Program':
                        return (
                            <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12">
                                <div className="text-center mb-12">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-4">Program Utama Pelatihan</h2>
                                    <p className="text-slate-500 max-w-2xl mx-auto">Modul pelatihan yang disesuaikan dengan kebutuhan terkini di faskes.</p>
                                </div>
                                {loading ? (
                                    <div className="text-center py-12">
                                        <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                        <p className="text-slate-500 mt-4">Memuat data program...</p>
                                    </div>
                                ) : programs.length === 0 ? (
                                    <div className="text-center py-12 text-slate-400">Belum ada program.</div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {programs.map((prog) => {
                                            const style = getIconStyle(prog.icon);
                                            return (
                                                <div key={prog.id} className="bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all border border-slate-100 group flex flex-col h-full">
                                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mb-6 ${style.bg} ${style.color} group-hover:scale-110 transition-transform`}>
                                                        <span className="material-symbols-outlined text-[28px]">{prog.icon}</span>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-3">{prog.title}</h3>
                                                    <p className="text-slate-500 text-sm leading-relaxed mb-6 flex-grow">{prog.description}</p>
                                                    <div className="flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                                                        <button onClick={() => navigateToSchedule('Pelatihan')} className="text-alo-blue font-semibold flex items-center gap-1 hover:text-blue-800 text-sm">
                                                            Jadwal <span className="material-symbols-outlined text-[16px]">chevron_right</span>
                                                        </button>
                                                        <button onClick={() => alert('Fitur unduh modul akan segera tersedia.')} className="text-teal-600 font-semibold flex items-center gap-1 hover:text-teal-800 text-sm border-l border-slate-200 pl-4">
                                                            <span className="material-symbols-outlined text-[16px]">download</span> Modul
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        );

                    case 'Jadwal':
                        const filteredSchedules = schedules.filter(s => s.category === scheduleCategory);
                        if (schedulesLoading) {
                            return (
                                <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12 text-center">
                                    <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                    <p className="text-slate-500 mt-4">Memuat jadwal...</p>
                                </div>
                            );
                        }
                        return (
                            <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12">
                                <div className="text-center mb-10">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-4">Jadwal & Reservasi</h2>
                                    <p className="text-slate-500">Pilih acara yang Anda inginkan, lihat detail, dan amankan kursi Anda.</p>
                                </div>
                                <div className="flex flex-wrap justify-center gap-2 mb-10">
                                    {['Pelatihan', 'Webinar', 'Workshop'].map(category => (
                                        <button key={category} onClick={() => { setScheduleCategory(category); setExpandedScheduleId(null); }} className={`px-6 py-3 rounded-full font-bold text-sm transition-all shadow-sm ${scheduleCategory === category ? 'bg-alo-blue text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                            {category}
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {filteredSchedules.length === 0 ? (
                                        <div className="col-span-full py-20 text-center text-slate-500 bg-white rounded-3xl border border-slate-200">
                                            <span className="material-symbols-outlined text-[48px] text-slate-300 mb-4">event_busy</span>
                                            <p className="font-medium">Belum ada jadwal {scheduleCategory.toLowerCase()} dalam waktu dekat.</p>
                                        </div>
                                    ) : (
                                        filteredSchedules.map((sch) => (
                                            <div key={sch.id} className="bg-white rounded-[2rem] shadow-sm hover:shadow-xl border border-slate-200 overflow-hidden flex flex-col transition-all duration-300 group">
                                                <div className="relative h-56 md:h-64 overflow-hidden cursor-pointer" onClick={() => toggleDescription(sch.id)}>
                                                    <img src={sch.img} alt={sch.course} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                                                    <div className="absolute top-4 right-4">
                                                        <span className={`px-4 py-1.5 text-xs font-bold rounded-full shadow-md backdrop-blur-md ${sch.status === 'Tersedia' ? 'bg-green-500/90 text-white' : 'bg-orange-500/90 text-white'}`}>{sch.status}</span>
                                                    </div>
                                                    <div className="absolute bottom-4 left-4 right-4">
                                                        <h3 className="text-xl md:text-2xl font-bold text-white drop-shadow-md leading-tight">{sch.course}</h3>
                                                    </div>
                                                </div>
                                                <div className="p-6 md:p-8 flex flex-col flex-grow bg-white relative z-10">
                                                    <div className="flex flex-wrap gap-x-6 gap-y-3 text-sm text-slate-600 mb-6 font-medium">
                                                        <span className="flex items-center gap-2"><span className="material-symbols-outlined text-[20px] text-alo-blue">calendar_month</span> {sch.date}</span>
                                                        <span className="flex items-center gap-2"><span className="material-symbols-outlined text-[20px] text-orange-500">schedule</span> {sch.time}</span>
                                                        <span className="flex items-center gap-2"><span className="material-symbols-outlined text-[20px] text-teal-500">group</span> {sch.quota}</span>
                                                    </div>
                                                    <div className="flex items-center justify-between mb-6">
                                                        <span className="text-slate-500 text-sm">Investasi</span>
                                                        <span className="text-2xl font-black text-alo-blue tracking-tight">{sch.price}</span>
                                                    </div>
                                                    <div className="mb-6">
                                                        <button onClick={() => toggleDescription(sch.id)} className="w-full flex justify-between items-center py-3 px-4 bg-slate-50 rounded-xl text-sm font-bold text-slate-600 hover:text-alo-blue transition-colors border border-slate-100">
                                                            Detail Pelatihan
                                                            <span className={`material-symbols-outlined transition-transform duration-300 ${expandedScheduleId === sch.id ? 'rotate-180' : ''}`}>expand_more</span>
                                                        </button>
                                                        {expandedScheduleId === sch.id && (
                                                            <div className="mt-3 p-4 bg-blue-50/50 rounded-xl text-sm text-slate-600 border border-blue-100 animate-slide-down leading-relaxed">
                                                                <p>{sch.description}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="mt-auto flex items-center gap-3">
                                                        <button onClick={() => handleBookingClick(sch)} className="flex-1 bg-alo-blue hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg shadow-blue-200 text-center">
                                                            Pesan Pelatihan
                                                        </button>
                                                        <button onClick={() => openShareModal(sch.course, 'course')} className="w-12 h-12 flex-shrink-0 rounded-xl bg-blue-50 text-alo-blue flex items-center justify-center hover:bg-alo-blue hover:text-white transition-all shadow-sm" title="Bagikan Pelatihan">
                                                            <span className="material-symbols-outlined text-[22px]">share</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        );

                    case 'Pengajar':
                        if (instructorsLoading) {
                            return (
                                <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12 text-center">
                                    <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                    <p className="text-slate-500 mt-4">Memuat data pengajar...</p>
                                </div>
                            );
                        }
                        if (instructors.length === 0) {
                            return (
                                <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12 text-center">
                                    <p className="text-slate-500">Belum ada data pengajar.</p>
                                </div>
                            );
                        }
                        return (
                            <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12">
                                <div className="text-center mb-12"><h2 className="text-3xl font-bold text-slate-800 mb-4">Profil Pengajar Ahli</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {instructors.map((inst) => (
                                        <div key={inst.id} className="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-slate-100 text-center group">
                                            <div className="h-48 overflow-hidden relative">
                                                <img src={inst.img} alt={inst.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            </div>
                                            <div className="px-6 pb-8 pt-6">
                                                <h3 className="text-xl font-bold text-slate-800 mb-1">{inst.name}</h3>
                                                <p className="text-alo-blue text-sm font-medium mb-4">{inst.role}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );

                    case 'Berita':
                        if (newsLoading) {
                            return (
                                <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12 text-center">
                                    <span className="material-symbols-outlined animate-spin text-4xl text-alo-blue">progress_activity</span>
                                    <p className="text-slate-500 mt-4">Memuat berita...</p>
                                </div>
                            );
                        }
                        if (news.length === 0) {
                            return (
                                <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12 text-center">
                                    <p className="text-slate-500">Belum ada berita atau artikel.</p>
                                </div>
                            );
                        }
                        return (
                            <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12">
                                <div className="text-center mb-12"><h2 className="text-3xl font-bold text-slate-800">Semua Berita & Artikel</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {news.map((item) => (
                                        <div key={item.id} onClick={() => openArticle(item)} className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-slate-100 flex flex-col cursor-pointer group">
                                            <div className="h-48 overflow-hidden relative">
                                                <img src={item.img} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            </div>
                                            <div className="p-5 flex flex-col flex-grow">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[10px] font-bold tracking-wider uppercase text-alo-blue bg-blue-50 px-2 py-1 rounded">{item.category}</span>
                                                    <span className="text-xs text-slate-400 font-medium">{item.date}</span>
                                                </div>
                                                <h3 className="text-base font-bold text-slate-800 group-hover:text-alo-blue transition-colors line-clamp-3 mb-4 leading-snug">{item.title}</h3>
                                                <div className="mt-auto flex justify-between items-center border-t border-slate-100 pt-3">
                                                    <span className="text-sm text-alo-blue font-semibold flex items-center gap-1 group-hover:text-blue-800">Baca <span className="material-symbols-outlined text-[16px]">chevron_right</span></span>
                                                    <button onClick={(e) => { e.stopPropagation(); openShareModal(item.title, 'news'); }} className="text-slate-400 hover:text-alo-blue p-1.5 -mr-1.5 rounded-full hover:bg-blue-50 transition-colors" title="Bagikan Artikel">
                                                        <span className="material-symbols-outlined text-[18px]">share</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );

                    case 'Galeri':
                        return (
                            <div className="animate-fade-in max-w-6xl mx-auto px-6 py-12">
                                <div className="text-center mb-12">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-2">Galeri Kegiatan</h2>
                                    <p className="text-slate-500">Dokumentasi momen berharga selama proses pelatihan berlangsung.</p>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {galleryList.map((img, idx) => (
                                        <div key={idx} className="group relative aspect-square rounded-2xl overflow-hidden cursor-pointer bg-slate-200 shadow-sm hover:shadow-xl transition-all">
                                            <img src={img} alt={`Gallery ${idx}`} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                            <div className="absolute inset-0 bg-alo-blue/0 group-hover:bg-alo-blue/20 transition-colors duration-300 flex items-center justify-center">
                                                <span className="material-symbols-outlined text-white opacity-0 group-hover:opacity-100 transition-opacity text-4xl drop-shadow-lg">zoom_in</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );

                    default:
                        return <div>Halaman tidak ditemukan</div>;
                }
            };

            // --- RENDER UTAMA ---
            return (
                <div className="min-h-screen flex flex-col relative bg-slate-50">
                    <nav className="bg-alo-blue sticky top-0 z-40 shadow-md">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex justify-between items-center h-[72px]">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('Beranda')}>
                                    <span className="text-2xl font-bold text-white tracking-tight uppercase">ADINKESTC</span>
                                </div>
                                <div className="hidden lg:flex items-center space-x-2">
                                    <button onClick={() => setActiveTab('Beranda')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Beranda' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Beranda</button>
                                    <button onClick={() => setActiveTab('Profil')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Profil' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Profil</button>
                                    <button onClick={() => setActiveTab('Program')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Program' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Program</button>
                                    <div className="relative group h-full flex items-center">
                                        <button onClick={() => navigateToSchedule('Pelatihan')} className={`px-3 py-2 text-sm transition-all flex items-center gap-1 cursor-pointer ${activeTab === 'Jadwal' ? 'text-white font-bold' : 'text-blue-100 group-hover:text-white'}`}>
                                            Jadwal <span className="material-symbols-outlined text-[16px]">expand_more</span>
                                        </button>
                                        <div className="absolute top-full left-0 w-4 h-4 bg-transparent"></div>
                                        <div className="dropdown-menu absolute top-[calc(100%+0.5rem)] left-0 w-48 bg-white border border-slate-100 rounded-xl shadow-xl flex flex-col py-2 z-50">
                                            <button onClick={() => navigateToSchedule('Pelatihan')} className="text-left px-5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-alo-blue font-medium">Pelatihan</button>
                                            <button onClick={() => navigateToSchedule('Webinar')} className="text-left px-5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-alo-blue font-medium">Webinar</button>
                                            <button onClick={() => navigateToSchedule('Workshop')} className="text-left px-5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-alo-blue font-medium">Workshop</button>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveTab('Pengajar')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Pengajar' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Pengajar</button>
                                    <button onClick={() => setActiveTab('Berita')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Berita' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Berita</button>
                                    <button onClick={() => setActiveTab('Galeri')} className={`px-3 py-2 text-sm transition-all ${activeTab === 'Galeri' ? 'text-white font-bold' : 'text-blue-100 hover:text-white'}`}>Galeri</button>
                                </div>
                                <button className="lg:hidden p-2 text-white" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                    <span className="material-symbols-outlined text-[24px]">{isMobileMenuOpen ? 'close' : 'menu'}</span>
                                </button>
                            </div>
                        </div>
                        {isMobileMenuOpen && (
                            <div className="lg:hidden bg-alo-blue border-t border-blue-500 absolute w-full px-4 py-4 space-y-1 shadow-xl">
                                <button onClick={() => { setActiveTab('Beranda'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Beranda</button>
                                <button onClick={() => { setActiveTab('Profil'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Profil</button>
                                <button onClick={() => { setActiveTab('Program'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Program</button>
                                <div className="px-4 py-2">
                                    <span className="font-bold text-blue-200 text-sm mb-2 block">Jadwal & Pendaftaran</span>
                                    <div className="pl-4 space-y-1 border-l-2 border-blue-400">
                                        <button onClick={() => navigateToSchedule('Pelatihan')} className="w-full text-left py-2 text-sm text-white hover:text-blue-200">Pelatihan Luring</button>
                                        <button onClick={() => navigateToSchedule('Webinar')} className="w-full text-left py-2 text-sm text-white hover:text-blue-200">Webinar Medis</button>
                                        <button onClick={() => navigateToSchedule('Workshop')} className="w-full text-left py-2 text-sm text-white hover:text-blue-200">Workshop</button>
                                    </div>
                                </div>
                                <button onClick={() => { setActiveTab('Pengajar'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Pengajar</button>
                                <button onClick={() => { setActiveTab('Berita'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Berita</button>
                                <button onClick={() => { setActiveTab('Galeri'); setIsMobileMenuOpen(false); }} className="w-full text-left px-4 py-3 rounded-lg text-white font-medium hover:bg-blue-600">Galeri</button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow w-full mx-auto" style={{ maxWidth: activeTab === 'Beranda' ? '100%' : '80rem' }}>
                        {renderContent()}
                    </main>

                    <footer className="bg-[#0f172a] text-slate-300 py-16 mt-auto border-t-[8px] border-alo-blue">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-12">
                            <div className="col-span-1 md:col-span-1">
                                <span className="text-2xl font-bold text-white tracking-tight uppercase block mb-4">ADINKESTC</span>
                                <p className="text-slate-400 mb-6 text-sm leading-relaxed">Lembaga pelatihan dan edukasi medis independen terkemuka di Indonesia, mencetak SDM kesehatan yang kompeten dan profesional.</p>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-6 tracking-wide">PINTASAN</h4>
                                <ul className="space-y-3 text-sm text-slate-400">
                                    <li><button onClick={() => setActiveTab('Profil')} className="hover:text-white transition-colors">Tentang Kami</button></li>
                                    <li><button onClick={() => navigateToSchedule('Pelatihan')} className="hover:text-white transition-colors">Jadwal Pelatihan</button></li>
                                    <li><button onClick={() => setActiveTab('Pengajar')} className="hover:text-white transition-colors">Instruktur Ahli</button></li>
                                    <li><button onClick={() => setActiveTab('Berita')} className="hover:text-white transition-colors">Artikel Kesehatan</button></li>
                                    <li><button onClick={() => setActiveTab('Galeri')} className="hover:text-white transition-colors">Galeri Kegiatan</button></li>
                                </ul>
                            </div>
                            <div className="col-span-1 md:col-span-2 bg-[#1e293b] p-6 rounded-2xl">
                                <h4 className="text-white font-bold mb-6 tracking-wide">HUBUNGI KAMI</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm text-slate-300">
                                    <div className="space-y-4">
                                        <li className="flex items-start gap-3">
                                            <span className="material-symbols-outlined text-[20px] text-alo-blue shrink-0">location_on</span>
                                            <span>{profile?.alamat || 'Gd. Kesehatan Lt.3, Jl. Merdeka No. 99, Kebayoran, Jakarta Selatan 12345'}</span>
                                        </li>
                                        <li className="flex items-center gap-3">
                                            <span className="material-symbols-outlined text-[20px] text-alo-blue shrink-0">mail</span>
                                            <span>{profile?.email || 'halo@medikaedu.co.id'}</span>
                                        </li>
                                    </div>
                                    <div className="space-y-4">
                                        <li className="flex items-center gap-3">
                                            <span className="material-symbols-outlined text-[20px] text-alo-blue shrink-0">call</span>
                                            <span>{profile?.telepon || '021 - 888 9999'}</span>
                                        </li>
                                        <li className="flex items-center gap-3">
                                            <span className="material-symbols-outlined text-[20px] text-[#25D366] shrink-0">chat</span>
                                            <span>{profile?.whatsapp || '+62 812 3456 7890'}</span>
                                        </li>
                                    </div>
                                </div>
                                <div className="mt-8 pt-6 border-t border-slate-600 flex gap-4">
                                    <a href="#" className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center hover:bg-alo-blue transition-colors text-white">
                                        <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                    </a>
                                    <a href="#" className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center hover:bg-pink-600 transition-colors text-white">
                                        <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                                    </a>
                                    <a href="#" className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center hover:bg-blue-400 transition-colors text-white">
                                        <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                                    </a>
                                    <a href="#" className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center hover:bg-blue-700 transition-colors text-white">
                                        <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-6 pt-8 mt-12 border-t border-slate-800 text-sm flex flex-col md:flex-row justify-between items-center text-slate-500 gap-4">
                            <p>&copy; 2026 Adinkes Training Center. Hak Cipta Dilindungi.</p>
                            <div className="flex gap-4">
                                <a href="#" className="hover:text-white transition-colors">Kebijakan Privasi</a>
                                <a href="#" className="hover:text-white transition-colors">Syarat & Ketentuan</a>
                            </div>
                        </div>
                    </footer>

                    <a href="https://wa.me/6281234567890" target="_blank" rel="noopener noreferrer" className="fixed bottom-6 right-6 bg-[#25D366] hover:bg-[#20bd5a] text-white p-4 rounded-full shadow-2xl z-40 flex items-center justify-center group transition-transform hover:scale-110">
                        <span className="material-symbols-outlined text-[32px]">chat</span>
                        <span className="absolute right-full mr-4 bg-white text-slate-800 text-sm font-bold py-2 px-3 rounded-lg shadow-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Konsultasi Admin</span>
                    </a>

                    {/* BOOKING MODAL */}
                    {isModalOpen && selectedCourse && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl animate-fade-in">
                                <div className="bg-alo-blue p-6 text-white relative">
                                    <button onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 p-1 rounded-full transition-colors">
                                        <span className="material-symbols-outlined text-[20px]">close</span>
                                    </button>
                                    <h3 className="text-xl font-bold mb-1">Form Reservasi</h3>
                                    <p className="text-blue-100 text-sm opacity-90">{selectedCourse.course}</p>
                                </div>
                                <div className="p-6">
                                    {isBooked ? (
                                        <div className="text-center py-8">
                                            <div className="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <span className="material-symbols-outlined text-[32px] icon-filled">check_circle</span>
                                            </div>
                                            <h4 className="text-xl font-bold text-slate-800 mb-2">Reservasi Berhasil!</h4>
                                            <p className="text-slate-500 text-sm">Silakan cek email atau WhatsApp Anda untuk instruksi selanjutnya.</p>
                                            <button onClick={() => setIsModalOpen(false)} className="mt-6 text-alo-blue font-semibold text-sm border px-4 py-2 rounded-lg hover:bg-slate-50">Tutup Jendela</button>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleFormSubmit} className="space-y-4">
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6 text-sm">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-slate-600">Pelaksanaan</span>
                                                    <span className="font-semibold text-slate-800">{selectedCourse.date}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span className="text-slate-600">Biaya/Investasi</span>
                                                    <span className="font-bold text-alo-blue">{selectedCourse.price}</span>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Peserta (beserta Gelar)</label>
                                                <input required type="text" name="nama" className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-alo-blue focus:ring-1 focus:ring-alo-blue" placeholder="Contoh: Dr. Budi Santoso" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1">Nomor WhatsApp Aktif</label>
                                                <input required type="tel" name="wa" className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-alo-blue focus:ring-1 focus:ring-alo-blue" placeholder="0812..." />
                                            </div>
                                            <button type="submit" disabled={isSubmitting} className="w-full mt-4 bg-alo-blue hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg disabled:opacity-50">
                                                {isSubmitting ? 'Memproses...' : 'Proses Reservasi'}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SHARE MODAL */}
                    {shareModalData.isOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[80] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in">
                                <div className="p-6">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="text-xl font-bold text-slate-800">{shareModalData.type === 'news' ? 'Bagikan Artikel' : 'Bagikan Pelatihan'}</h3>
                                        <button onClick={closeShareModal} className="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 p-1.5 rounded-full transition-colors flex items-center justify-center">
                                            <span className="material-symbols-outlined text-[20px]">close</span>
                                        </button>
                                    </div>
                                    <p className="text-sm text-slate-500 mb-6 font-medium leading-snug">{shareModalData.title}</p>
                                    <div className="grid grid-cols-4 gap-2 mb-6">
                                        <button onClick={() => handleShareAction('whatsapp')} className="flex flex-col items-center gap-2 group">
                                            <div className="w-12 h-12 rounded-full bg-[#25D366]/10 text-[#25D366] flex items-center justify-center group-hover:bg-[#25D366] group-hover:text-white transition-all">
                                                <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                                            </div>
                                            <span className="text-[10px] font-semibold text-slate-500 group-hover:text-slate-800 transition-colors">WhatsApp</span>
                                        </button>
                                        <button onClick={() => handleShareAction('facebook')} className="flex flex-col items-center gap-2 group">
                                            <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                            </div>
                                            <span className="text-[10px] font-semibold text-slate-500 group-hover:text-slate-800 transition-colors">Facebook</span>
                                        </button>
                                        <button onClick={() => handleShareAction('twitter')} className="flex flex-col items-center gap-2 group">
                                            <div className="w-12 h-12 rounded-full bg-slate-100 text-slate-800 flex items-center justify-center group-hover:bg-slate-800 group-hover:text-white transition-all">
                                                <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                            </div>
                                            <span className="text-[10px] font-semibold text-slate-500 group-hover:text-slate-800 transition-colors">Twitter (X)</span>
                                        </button>
                                        <button onClick={handleCopyLink} className="flex flex-col items-center gap-2 group">
                                            <div className="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-all">
                                                <span className="material-symbols-outlined text-[20px]">content_copy</span>
                                            </div>
                                            <span className="text-[10px] font-semibold text-slate-500 group-hover:text-slate-800 transition-colors">Salin</span>
                                        </button>
                                    </div>
                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center justify-between">
                                        <div className="text-xs text-slate-500 truncate mr-3 flex-1 select-all">{shareModalData.url}</div>
                                        {copySuccess ? (
                                            <span className="text-xs font-bold text-green-500 whitespace-nowrap bg-green-50 px-2 py-1 rounded-md">{copySuccess}</span>
                                        ) : (
                                            <button onClick={handleCopyLink} className="text-xs font-bold text-alo-blue whitespace-nowrap hover:text-blue-800 transition-colors">Salin</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ARTIKEL MODAL */}
                    {articleModal.isOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[90] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl animate-fade-in">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                                    <h3 className="text-xl font-bold text-slate-800">Detail Artikel</h3>
                                    <button onClick={closeArticle} className="text-slate-400 hover:text-red-500 p-1.5 rounded-full transition-colors">
                                        <span className="material-symbols-outlined text-[24px]">close</span>
                                    </button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <img src={articleModal.img} alt={articleModal.title} className="w-full h-64 object-cover rounded-2xl" />
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs font-bold text-alo-blue bg-blue-50 px-3 py-1 rounded-full">{articleModal.category}</span>
                                        <span className="text-sm text-slate-400">{articleModal.date}</span>
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800">{articleModal.title}</h2>
                                    <div className="prose prose-slate max-w-none text-slate-600 leading-relaxed whitespace-pre-line">
                                        {articleModal.content}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
