<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medika Edukasi Nusantara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'alo-blue': '#1E73BE'
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-down': 'slideDown 0.3s ease-out forwards'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(15px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              slideDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              }
            }
          }
        }
      }
    </script>

    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .group:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
      .dropdown-menu { opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease-in-out; }
    </style>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // --- INISIALISASI SUPABASE ---
      const supabaseUrl = 'https://ciigcaudmesmtgznyoga.supabase.co';
      // Ganti dengan kunci ANON Anda melalui environment/secret di produksi
      const supabaseAnonKey = 'REPLACE_WITH_SUPABASE_ANON_KEY';
      const supabase = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseAnonKey) : null;

      // --- DATA STATIS SEDERHANA ---
      const schedulesData = {
        Pelatihan: [
          { id: 1, course: 'Bantuan Hidup Dasar (BHD)', date: '15-16 Agustus 2026', time: '08:00 - 16:00', quota: '20 Peserta', price: 'Rp 1.500.000', status: 'Tersedia', img: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=800&q=80', description: 'Pelatihan mengenai teknik resusitasi jantung paru (RJP), penanganan tersedak, dan penggunaan AED.' },
          { id: 2, course: 'K3 Rumah Sakit', date: '22-24 Agustus 2026', time: '08:00 - 15:00', quota: '15 Peserta', price: 'Rp 2.500.000', status: 'Hampir Penuh', img: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=800&q=80', description: 'Manajemen Keselamatan & Kesehatan Kerja di lingkungan rumah sakit.' }
        ],
        Webinar: [
          { id: 3, course: 'Webinar: Update Pedoman PPI 2026', date: '10 Agustus 2026', time: '09:00 - 11:30', quota: '500 Peserta', price: 'Gratis', status: 'Tersedia', img: 'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=800&q=80', description: 'Webinar pedoman Pencegahan dan Pengendalian Infeksi.' }
        ],
        Workshop: [
          { id: 5, course: 'Workshop Interpretasi EKG Dasar', date: '5 September 2026', time: '08:00 - 16:00', quota: '30 Peserta', price: 'Rp 750.000', status: 'Tersedia', img: 'https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&w=800&q=80', description: 'Hands-on membaca dan menginterpretasikan EKG dasar.' }
        ]
      };

      const instructors = [
        { id: 1, name: 'Dr. Andi Pratama, Sp.EM', role: 'Spesialis Ahli Gawat Darurat', img: 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=300&q=80' },
        { id: 2, name: 'Ns. Siti Aminah, S.Kep., M.Kep', role: 'Konsultan Manajemen Keperawatan', img: 'https://images.unsplash.com/photo-1594824436998-d1d7847c2121?auto=format&fit=crop&w=300&q=80' }
      ];

      const newsList = [
        { id: 1, title: 'Pentingnya Sertifikasi BHD bagi Seluruh Karyawan Rumah Sakit', date: '10 Juni 2026', category: 'Artikel', img: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=800&q=80' },
        { id: 2, title: 'MedikaEdu Sukses Gelar Pelatihan Manajemen Bangsal', date: '05 Juni 2026', category: 'Berita', img: 'https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=800&q=80' }
      ];

      const orgStructure = [
        { id: 1, name: 'Dr. Hendra Wijaya, MARS', role: 'Direktur Utama', type: 'Pimpinan' },
        { id: 2, name: 'Ns. Ratna Sari, S.Kep., M.Kes', role: 'Manajer Operasional & Pelatihan', type: 'Manajerial' }
      ];

      const galleryList = [
        'https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=600&q=80'
      ];

      function App() {
        const [activeTab, setActiveTab] = useState('Beranda');
        const [scheduleCategory, setScheduleCategory] = useState('Pelatihan');
        const [expandedScheduleId, setExpandedScheduleId] = useState(null);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [selectedCourse, setSelectedCourse] = useState(null);
        const [shareModalData, setShareModalData] = useState({ isOpen: false, title: '', url: '', type: 'course' });
        const [copySuccess, setCopySuccess] = useState('');

        // Supabase data (optional) - attempt fetch only if supabase available
        const [programs, setPrograms] = useState([]);
        const [loading, setLoading] = useState(true);
        const [profile, setProfile] = useState(null);
        const [profileLoading, setProfileLoading] = useState(true);

        useEffect(() => {
          async function fetchPrograms() {
            if (!supabase) { setLoading(false); return; }
            setLoading(true);
            const { data, error } = await supabase.from('programs').select('*').order('id', { ascending: true });
            if (error) { console.error('Error fetching programs:', error); setPrograms([]); }
            else setPrograms(data || []);
            setLoading(false);
          }
          fetchPrograms();
        }, []);

        useEffect(() => {
          async function fetchProfile() {
            if (!supabase) { setProfileLoading(false); return; }
            const { data, error } = await supabase.from('institution_profile').select('*').eq('id', 1).single();
            if (error) { console.error('Error fetching profile:', error); setProfile(null); }
            else setProfile(data);
            setProfileLoading(false);
          }
          fetchProfile();
        }, []);

        const navigateToSchedule = (category) => { setScheduleCategory(category); setActiveTab('Jadwal'); setExpandedScheduleId(null); window.scrollTo(0,0); };
        const handleBookingClick = (course) => { setSelectedCourse(course); setIsModalOpen(true); };
        const handleFormSubmit = (e) => { e.preventDefault(); setTimeout(() => setIsModalOpen(false), 2000); };
        const toggleDescription = (id) => setExpandedScheduleId(expandedScheduleId === id ? null : id);
        const openShareModal = (title, type='course') => setShareModalData({ isOpen: true, title, url: window.location.href, type });
        const closeShareModal = () => setShareModalData({ ...shareModalData, isOpen: false });

        const handleShareAction = (platform) => {
          const text = encodeURIComponent(`${shareModalData.title} - lihat di ${shareModalData.url}`);
          const url = encodeURIComponent(shareModalData.url);
          if (platform === 'whatsapp') window.open(`https://api.whatsapp.com/send?text=${text}%20${url}`, '_blank');
          if (platform === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
          if (platform === 'twitter') window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
        };

        const handleCopyLink = () => {
          navigator.clipboard?.writeText(shareModalData.url).then(() => { setCopySuccess('Tautan disalin!'); setTimeout(() => setCopySuccess(''), 2000); }).catch(() => setCopySuccess('Gagal menyalin'));
        };

        const renderContent = () => {
          switch (activeTab) {
            case 'Beranda':
              return (
                <div className="animate-fade-in pb-12">
                  <section className="bg-alo-blue pt-12 pb-0 px-6 text-white">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center">
                      <div className="w-full md:w-3/5 py-10">
                        <h1 className="text-4xl font-bold">Layanan Cepat dan Tepat</h1>
                        <p className="mt-4">Layanan Booking Pelatihan dan Edukasi Medis Terbaik di Indonesia</p>
                        <div className="mt-6 flex gap-4">
                          <button onClick={() => navigateToSchedule('Pelatihan')} className="bg-white text-alo-blue px-4 py-2 rounded">Pelatihan</button>
                          <button onClick={() => setActiveTab('Berita')} className="bg-white/20 px-4 py-2 rounded">Berita</button>
                        </div>
                      </div>
                      <div className="w-full md:w-2/5">
                        <img src="https://images.unsplash.com/photo-1537368910025-700350fe46c7?auto=format&fit=crop&w=700&q=80" alt="Tenaga Medis" className="rounded-xl shadow-md" />
                      </div>
                    </div>
                  </section>

                  <section className="px-6 py-12">
                    <div className="max-w-7xl mx-auto">
                      <h2 className="text-2xl font-bold mb-4">Info Kesehatan & Artikel</h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {newsList.map(n => (
                          <div key={n.id} className="bg-white p-4 rounded-lg shadow">
                            <img src={n.img} alt={n.title} className="w-full h-40 object-cover rounded" />
                            <h3 className="mt-3 font-bold">{n.title}</h3>
                            <div className="mt-2 flex justify-between items-center">
                              <button onClick={() => setActiveTab('Berita')} className="text-alo-blue">Baca</button>
                              <button onClick={() => openShareModal(n.title, 'news')} className="text-slate-500">Share</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </section>
                </div>
              );

            case 'Program':
              return (
                <div className="px-6 py-12 max-w-6xl mx-auto">
                  <h2 className="text-3xl font-bold mb-4">Program Utama Pelatihan</h2>
                  {loading ? <p>Memuat data program...</p> : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {(programs.length ? programs : [{ id: 'p1', title: 'Contoh Program', description: 'Deskripsi singkat' }]).map(p => (
                        <div key={p.id} className="bg-white p-6 rounded-lg shadow">
                          <h3 className="font-bold">{p.title}</h3>
                          <p className="mt-2 text-sm text-slate-600">{p.description}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );

            case 'Jadwal':
              return (
                <div className="px-6 py-12 max-w-6xl mx-auto">
                  <h2 className="text-3xl font-bold mb-6">Jadwal & Reservasi</h2>
                  <div className="mb-6">
                    {Object.keys(schedulesData).map(cat => (
                      <button key={cat} onClick={() => setScheduleCategory(cat)} className={`px-4 py-2 mr-2 rounded ${scheduleCategory===cat? 'bg-alo-blue text-white':'bg-white'}`}>{cat}</button>
                    ))}
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    {schedulesData[scheduleCategory].map(sch => (
                      <div key={sch.id} className="bg-white rounded-lg shadow">
                        <img src={sch.img} alt={sch.course} className="w-full h-48 object-cover rounded-t-lg" />
                        <div className="p-4">
                          <h3 className="font-bold">{sch.course}</h3>
                          <p className="text-sm text-slate-600 mt-2">{sch.date} · {sch.time}</p>
                          <div className="mt-4 flex gap-2">
                            <button onClick={() => handleBookingClick(sch)} className="bg-alo-blue text-white px-4 py-2 rounded">Pesan</button>
                            <button onClick={() => openShareModal(sch.course,'course')} className="px-4 py-2 rounded border">Share</button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );

            case 'Berita':
              return (
                <div className="px-6 py-12 max-w-6xl mx-auto">
                  <h2 className="text-3xl font-bold mb-6">Semua Berita & Artikel</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {newsList.map(n => (
                      <div key={n.id} className="bg-white rounded-lg shadow p-4">
                        <img src={n.img} alt={n.title} className="w-full h-40 object-cover rounded" />
                        <h3 className="mt-3 font-bold">{n.title}</h3>
                        <div className="mt-2 flex justify-between items-center">
                          <button onClick={() => openShareModal(n.title,'news')} className="text-slate-600">Bagikan</button>
                          <span className="text-xs text-slate-400">{n.date}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );

            case 'Profil':
              if (profileLoading) return <div className="p-12 text-center">Memuat profil...</div>;
              if (!profile) return <div className="p-12 text-center">Profil belum tersedia.</div>;
              return (
                <div className="px-6 py-12 max-w-5xl mx-auto">
                  <h2 className="text-3xl font-bold mb-4">Profil Lembaga</h2>
                  <p className="text-slate-600">{profile.name || 'Medika Edukasi Nusantara'}</p>
                </div>
              );

            default:
              return <div className="p-12">Halaman tidak ditemukan</div>;
          }
        };

        return (
          <div className="min-h-screen flex flex-col">
            <nav className="bg-alo-blue text-white p-4">
              <div className="max-w-7xl mx-auto flex justify-between items-center">
                <div className="font-bold">MEDIKAEDU</div>
                <div className="space-x-3 hidden md:block">
                  <button onClick={() => setActiveTab('Beranda')} className={`px-3 py-2 ${activeTab==='Beranda'? 'font-bold':''}`}>Beranda</button>
                  <button onClick={() => setActiveTab('Profil')} className="px-3 py-2">Profil</button>
                  <button onClick={() => setActiveTab('Program')} className="px-3 py-2">Program</button>
                  <button onClick={() => setActiveTab('Jadwal')} className="px-3 py-2">Jadwal</button>
                  <button onClick={() => setActiveTab('Pengajar')} className="px-3 py-2">Pengajar</button>
                  <button onClick={() => setActiveTab('Berita')} className="px-3 py-2">Berita</button>
                </div>
                <div className="md:hidden">
                  <button onClick={() => setActiveTab('Beranda')}>Menu</button>
                </div>
              </div>
            </nav>

            <main className="flex-grow">{renderContent()}</main>

            <footer className="bg-[#0f172a] text-slate-300 py-8">
              <div className="max-w-7xl mx-auto px-6">&copy; 2026 Medika Edukasi Nusantara</div>
            </footer>

            {/* Booking Modal */}
            {isModalOpen && selectedCourse && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
                <div className="bg-white rounded-lg p-6 w-full max-w-md">
                  <h3 className="font-bold">Form Reservasi</h3>
                  <p className="text-sm text-slate-600">{selectedCourse.course}</p>
                  <form onSubmit={handleFormSubmit} className="mt-4">
                    <input required placeholder="Nama Peserta" className="w-full p-2 border rounded mb-3" />
                    <input required placeholder="Nomor WhatsApp" className="w-full p-2 border rounded mb-3" />
                    <div className="flex gap-2">
                      <button type="submit" className="bg-alo-blue text-white px-4 py-2 rounded">Proses Reservasi</button>
                      <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 border rounded">Batal</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* Share Modal */}
            {shareModalData.isOpen && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
                <div className="bg-white rounded-lg p-6 w-full max-w-sm">
                  <div className="flex justify-between items-center mb-2">
                    <h3 className="font-bold">{shareModalData.type==='news'? 'Bagikan Artikel' : 'Bagikan Pelatihan'}</h3>
                    <button onClick={closeShareModal} className="text-slate-600">Tutup</button>
                  </div>
                  <p className="text-sm text-slate-600 mb-4">{shareModalData.title}</p>
                  <div className="flex gap-2">
                    <button onClick={() => handleShareAction('whatsapp')} className="px-3 py-2 bg-[#25D366] text-white rounded">WhatsApp</button>
                    <button onClick={() => handleShareAction('facebook')} className="px-3 py-2 bg-blue-600 text-white rounded">Facebook</button>
                    <button onClick={() => handleCopyLink()} className="px-3 py-2 bg-orange-500 text-white rounded">Salin</button>
                  </div>
                  {copySuccess && <div className="mt-3 text-green-600">{copySuccess}</div>}
                </div>
              </div>
            )}

          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
